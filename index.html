<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>GOLPEADO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--felt:#0d3b1f;--gold:#C9A84C;--red:#C0392B;--cw:44px;--ch:65px}
@media(max-width:420px){:root{--cw:32px;--ch:48px}}
@media(min-width:600px){:root{--cw:52px;--ch:76px}}
@media(min-width:900px){:root{--cw:62px;--ch:90px}}
@media(min-width:1200px){:root{--cw:68px;--ch:100px}}
/* desktop: centrar y limitar ancho del tapete */
@media(min-width:600px){
  body{display:flex;align-items:center;justify-content:center;}
  #G{width:min(560px,98vw);height:min(900px,98dvh);border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--felt);color:#e8dcc8;font-family:'Crimson Pro',serif}
/* iOS Safari fix: usar JS para altura real */
#G{width:100%;height:100dvh;min-height:520px;display:grid;grid-template-rows:auto 1fr auto;padding:4px;gap:2px;position:relative}
#G::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px);pointer-events:none}
.border{position:absolute;inset:2px;border-radius:14px;border:1.5px solid rgba(201,168,76,.2);pointer-events:none}
/* BOTS */
#BR{display:flex;justify-content:space-around;width:100%;gap:4px;padding:2px 4px}
.bot{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;max-width:160px}
.bname{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);white-space:nowrap}
.bcards{display:flex;gap:2px;align-items:center}
.binfo{font-size:9px;color:rgba(232,220,200,.5)}
.adot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;margin-right:3px;animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* CENTER — usa flex y se adapta al espacio disponible */
.czone{display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;gap:3px;min-height:0;flex:1}
/* COMBOS — sin max-height fijo, crece con el contenido */
#TC{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:flex-start;width:100%;padding:0 4px;overflow-y:auto;max-height:none}
.cset{display:flex;gap:1px;padding:2px;border-radius:4px;background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.18)}
.dkarea{display:flex;gap:14px;align-items:center;justify-content:center;flex-shrink:0}
.dklbl{text-align:center;font-size:8px;color:rgba(201,168,76,.4);margin-top:2px;font-family:Cinzel,serif}
.dkstack{position:relative;width:var(--cw);height:var(--ch);cursor:pointer;flex-shrink:0}
.dkstack .card{position:absolute}
.dkstack .card:nth-child(1){top:2px;left:2px}
.dkstack .card:nth-child(2){top:1px;left:1px}
.dkstack .card:nth-child(3){top:0;left:0}
/* DP — touch-action none para que no interfiera el scroll */
#DP{width:var(--cw);height:var(--ch);border-radius:4px;border:1.5px dashed rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:visible;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.dpmt{font-size:7px;color:rgba(201,168,76,.4);font-family:'Cinzel',serif;text-align:center;line-height:1.3}
.dpct{position:absolute;top:-7px;right:-7px;background:var(--gold);color:#1a1230;font-family:'Cinzel',serif;font-size:8px;font-weight:700;border-radius:10px;padding:1px 5px;z-index:2;pointer-events:none}
#MSG{font-size:11px;color:#f0e8d0;text-align:center;font-style:italic;padding:2px 8px;min-height:16px;line-height:1.4;text-shadow:0 1px 3px rgba(0,0,0,.8);font-weight:600}
@keyframes tuTurno{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}
.tu-turno{animation:tuTurno 1s ease-in-out infinite;color:var(--gold)!important;font-weight:700!important;text-shadow:0 0 12px rgba(201,168,76,.8)!important;font-style:normal!important}
/* PLAYER ZONE */
.pzone{display:flex;flex-direction:column;align-items:center;gap:2px;padding-bottom:2px;flex-shrink:0}
#HUD{display:flex;gap:10px;font-size:9px;color:rgba(232,220,200,.65)}
.hv{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);display:block;text-align:center}
#ACT{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:0 4px;min-height:26px;align-items:center}
.plbl{font-family:'Cinzel',serif;font-size:9px;color:rgba(201,168,76,.65)}
/* HAND — scroll horizontal, overflow-y visible para las cartas seleccionadas */
.hwrap{width:100%;overflow-x:auto;overflow-y:visible;padding:6px 4px 2px;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.hwrap.dragging{overflow-x:hidden;touch-action:none}
.hwrap::-webkit-scrollbar{height:3px}
.hwrap::-webkit-scrollbar-thumb{background:rgba(201,168,76,.4);border-radius:2px}
#PH{display:flex;gap:3px;flex-wrap:nowrap;min-width:max-content;padding-bottom:2px;padding-top:2px}
/* CARD */
.card{width:var(--cw);height:var(--ch);border-radius:4px;border:1.2px solid #ccc;background:#fff;display:grid;grid-template-rows:14px 1fr 14px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;user-select:none;flex-shrink:0;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(min-width:600px){.card{grid-template-rows:18px 1fr 18px}}
@media(min-width:900px){.card{grid-template-rows:20px 1fr 20px}}
@media(min-width:1200px){.card{grid-template-rows:22px 1fr 22px}}
.card.draggable{touch-action:pan-y}
.card.red{color:#C0392B}.card.blk{color:#111111}.card.green{color:#1a6e1a}.card.orange{color:#1E90FF}
.card.jkcard{background:linear-gradient(135deg,#2a0a4a,#1a0a3a);border-color:#7B5AAA;border-width:1.5px}
.card.wlcard{background:linear-gradient(135deg,#0a2535,#0a1f2e);border-color:#1a7a8a;border-width:1.5px}
.card.sel{transform:translateY(-10px);box-shadow:0 0 0 2px var(--gold),0 8px 18px rgba(0,0,0,.45)}
.card.back{background:#1a1230;border-color:#333;cursor:default}
.card.back:hover,.card.back:active{transform:none;box-shadow:none}
.cn{display:flex;align-items:center;gap:1px;padding:1px 2px;line-height:1}
.cn.b{transform:rotate(180deg)}
.cnn{font-size:10px;font-weight:700;line-height:1}.cns{font-size:9px;line-height:1}
@media(min-width:600px){.cnn{font-size:12px}.cns{font-size:11px}}
@media(min-width:900px){.cnn{font-size:13px}.cns{font-size:12px}}
@media(min-width:1200px){.cnn{font-size:14px}.cns{font-size:13px}}
@media(max-width:420px){.cnn{font-size:9px}.cns{font-size:8px}}
.cc{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cc svg{width:100%;height:100%;display:block}
.cbk{width:100%;height:100%;background:#1a1230;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cbk::before{content:'';position:absolute;inset:3px;border:1px solid rgba(201,168,76,.3);border-radius:2px}
.cbk::after{content:'G';font-family:'Cinzel',serif;font-size:11px;color:rgba(201,168,76,.6);font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
/* BUTTONS */
.btn{padding:5px 10px;border-radius:5px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cinzel',serif;font-size:9px;cursor:pointer;transition:all .12s;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{background:var(--gold);color:#1a1230}
.btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.btn.dng{border-color:#E24B4A;color:#E24B4A}
.btn.dng:hover,.btn.dng:active{background:#E24B4A;color:#fff}
.btn.pri{background:var(--gold);color:#1a1230;font-weight:600}
.hint{font-size:9px;color:rgba(232,220,200,.4);font-style:italic}
.drag-over{box-shadow:0 0 0 2.5px var(--gold) !important;transform:translateY(-6px) !important}
/* OVERLAYS */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.92);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;padding:16px}
.ov h2{font-family:'Cinzel',serif;color:var(--gold);font-size:16px;letter-spacing:.1em;text-align:center}
.ov p{font-size:11px;color:rgba(232,220,200,.8);text-align:center;max-width:280px;line-height:1.5}
.rtbl{font-size:10px;width:100%;max-width:300px;border-collapse:collapse}
.rtbl td,.rtbl th{padding:4px 6px;border-bottom:1px solid rgba(201,168,76,.2)}
.rtbl th{font-family:'Cinzel',serif;font-size:8px;color:var(--gold);font-weight:400}
.wrow td{color:var(--gold);font-weight:600}
/* HTP overlay — laptop */
@media(min-width:600px){
  #HTP_OV p{font-size:15px !important;line-height:1.8 !important}
  #HTP_OV div[style*="font-size:11px"]{font-size:13px !important}
  #HTP_OV div[style*="font-size:12px"]{font-size:15px !important}
  #HTP_OV div[style*="font-size:13px"]{font-size:16px !important}
  #HTP_OV div[style*="font-size:10px"]{font-size:12px !important}
  #HTP_OV button[id^="HTP_TAB"]{font-size:12px !important;padding:10px 16px !important}
  #HTP_OV #HTP_OK{font-size:15px !important;padding:14px !important}
}
/* SHUFFLE */
.shov{position:absolute;inset:0;background:rgba(0,0,0,.9);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:300}
.shdeck{position:relative;width:80px;height:100px;margin:0 auto}
.sc{position:absolute;width:46px;height:68px;border-radius:4px;background:#1a1230;border:1.2px solid #444}
.sc::before{content:'';position:absolute;inset:3px;border:1px solid rgba(201,168,76,.3);border-radius:2px}
.sc::after{content:'G';font-family:'Cinzel',serif;font-size:10px;color:rgba(201,168,76,.55);font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
@keyframes sa1{0%,100%{transform:translate(0,0) rotate(0)}45%,55%{transform:translate(-25px,-5px) rotate(-9deg)}}
@keyframes sa2{0%,100%{transform:translate(0,0) rotate(0)}45%,55%{transform:translate(25px,5px) rotate(9deg)}}
.sa1{animation:sa1 .5s ease-in-out}.sa2{animation:sa2 .5s ease-in-out}
.smsg{font-family:'Cinzel',serif;font-size:13px;color:rgba(232,220,200,.9);text-align:center;letter-spacing:.04em}
.ssub{font-size:11px;color:rgba(232,220,200,.45);text-align:center}
.cbtn{padding:10px 28px;border-radius:8px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cinzel',serif;font-size:12px;cursor:pointer;letter-spacing:.05em;transition:all .15s;touch-action:manipulation}
.cbtn:hover,.cbtn:active{background:var(--gold);color:#1a1230}
/* FLY */
.fly{position:fixed;width:var(--cw);height:var(--ch);border-radius:4px;background:#1a1230;border:1.2px solid #333;pointer-events:none;z-index:500;overflow:hidden;transition:transform .3s cubic-bezier(.25,.46,.45,.94),opacity .3s}
.fly::before{content:'';position:absolute;inset:3px;border:1px solid rgba(201,168,76,.3);border-radius:2px}
.fly::after{content:'G';font-family:'Cinzel',serif;font-size:10px;color:rgba(201,168,76,.55);font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}

/* GOLPEADO ANIMATION */
@keyframes golpeIn{
  0%{transform:scale(0.2) rotate(-15deg);opacity:0}
  40%{transform:scale(1.35) rotate(3deg);opacity:1}
  60%{transform:scale(0.95) rotate(-1deg)}
  75%{transform:scale(1.08) rotate(1deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes golpeShake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-12px) rotate(-2deg)}
  30%{transform:translateX(10px) rotate(2deg)}
  45%{transform:translateX(-8px) rotate(-1deg)}
  60%{transform:translateX(6px) rotate(1deg)}
  75%{transform:translateX(-4px)}
}
@keyframes golpeOut{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.2) translateY(-30px)}
}
@keyframes ripple{
  0%{transform:scale(0);opacity:.8}
  100%{transform:scale(4);opacity:0}
}
@keyframes flashBg{
  0%,100%{background:transparent}
  20%{background:rgba(226,75,74,.18)}
  40%{background:transparent}
  60%{background:rgba(226,75,74,.1)}
}
.golpe-overlay{
  position:absolute;inset:0;z-index:600;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;border-radius:14px;
  animation:flashBg .6s ease-out forwards;
}
.golpe-text{
  font-family:'Cinzel',serif;font-size:clamp(36px,10vw,72px);font-weight:700;
  color:#E24B4A;letter-spacing:.08em;
  text-shadow:0 0 40px rgba(226,75,74,.8),0 4px 0 rgba(0,0,0,.5);
  animation:golpeIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
  line-height:1;
}
.golpe-sub{
  font-family:'Cinzel',serif;font-size:clamp(12px,3vw,18px);
  color:rgba(232,220,200,.9);letter-spacing:.15em;margin-top:8px;
  opacity:0;animation:golpeIn .4s .25s ease-out forwards;
}
.golpe-ripple{
  position:absolute;width:120px;height:120px;border-radius:50%;
  border:3px solid rgba(226,75,74,.6);
  animation:ripple .8s ease-out forwards;
}
.golpe-ripple2{animation-delay:.15s !important}
.golpe-ripple3{animation-delay:.3s !important}
@keyframes penaltyIn{
  0%{transform:scale(0.1) rotate(10deg);opacity:0}
  45%{transform:scale(1.4) rotate(-3deg);opacity:1}
  65%{transform:scale(0.92) rotate(1deg)}
  80%{transform:scale(1.06) rotate(-1deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes penaltyOut{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.15) translateY(-20px)}
}
@keyframes penaltyShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px) rotate(-1.5deg)}
  40%{transform:translateX(8px) rotate(1.5deg)}
  60%{transform:translateX(-6px) rotate(-1deg)}
  80%{transform:translateX(4px)}
}
@keyframes flashRed{
  0%,100%{background:transparent}
  25%{background:rgba(226,75,74,.2)}
  50%{background:transparent}
  75%{background:rgba(226,75,74,.12)}
}
.penalty-overlay{
  position:absolute;inset:0;z-index:650;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;border-radius:14px;gap:6px;
  animation:flashRed .5s ease-out forwards;
}
.penalty-icon{font-size:clamp(40px,10vw,64px);animation:penaltyIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;line-height:1}
.penalty-title{font-family:'Cinzel',serif;font-size:clamp(22px,6vw,44px);font-weight:700;color:#E24B4A;letter-spacing:.06em;text-shadow:0 0 30px rgba(226,75,74,.8),0 3px 0 rgba(0,0,0,.5);animation:penaltyIn .45s .1s cubic-bezier(.175,.885,.32,1.275) both;line-height:1.1;text-align:center}
.penalty-sub{font-family:'Cinzel',serif;font-size:clamp(11px,3vw,16px);color:rgba(232,220,200,.9);letter-spacing:.08em;text-align:center;max-width:280px;line-height:1.5;opacity:0;animation:penaltyIn .4s .3s ease-out forwards;padding:0 16px}
.chip{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-family:'Cinzel',serif;font-weight:700;cursor:pointer;border:3px dashed rgba(255,255,255,.35);transition:transform .12s,box-shadow .12s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0}
.chip:active{transform:scale(.92)}
.chip.sel{transform:scale(1.18);box-shadow:0 0 0 3px #fff,0 0 16px rgba(255,255,255,.5)}
.chip-1 {width:52px;height:52px;background:#e8e8e8;color:#333;font-size:14px;border-color:rgba(0,0,0,.2)}
.chip-5 {width:52px;height:52px;background:#C0392B;color:#fff;font-size:14px}
.chip-10{width:52px;height:52px;background:#2471A3;color:#fff;font-size:14px}
.chip-20{width:52px;height:52px;background:#1E8449;color:#fff;font-size:14px}
.chip-50{width:52px;height:52px;background:#1a1a1a;color:#C9A84C;font-size:13px;border-color:#C9A84C}
#CUENTAS_BTN{position:absolute;top:6px;right:8px;z-index:50;font-family:'Cinzel',serif;font-size:8px;color:rgba(201,168,76,.5);border:1px solid rgba(201,168,76,.25);background:transparent;border-radius:4px;padding:2px 6px;cursor:pointer;touch-action:manipulation}
#CUENTAS_BTN:hover,#CUENTAS_BTN:active{color:var(--gold);border-color:var(--gold)}
</style>
</head>
<body>
<div id="G">
  <div class="border"></div>
  <button id="CUENTAS_BTN" onclick="showCuentas()" ontouchend="e=>{e.preventDefault();showCuentas()}">💰 Cuentas</button>
  <div id="BR"></div>
  <div class="czone" style="flex:1;min-height:0">
    <div id="TC"></div>
    <div class="dkarea">
      <div><div class="dkstack" id="DK"></div><div class="dklbl">MAZO</div></div>
      <div><div id="DP"></div><div class="dklbl">DESCARTE</div></div>
    </div>
    <div id="MSG"></div>
  </div>
  <div class="pzone">
    <div id="HUD"></div>
    <div id="ACT"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 4px">
      <div class="plbl">Tu mano — toca para seleccionar · arrastra para ordenar</div>
      <button id="SORT_BTN" ontouchend="event.preventDefault();sortHand()" onclick="sortHand()" style="font-family:Cinzel,serif;font-size:8px;color:rgba(201,168,76,.6);border:1px solid rgba(201,168,76,.25);background:transparent;border-radius:4px;padding:2px 7px;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0">⇕ Ordenar</button>
    </div>
    <div class="hwrap"><div id="PH"></div></div>
    <div id="HAND_PTS" style="font-size:10px;text-align:center;min-height:14px;padding:2px 0;font-family:Cinzel,serif"></div>
  </div>
</div>
<script>

const FM={11:'J',12:'Q',13:'K'};
const SUITS=[{s:'♥',c:'red',h:'#C0392B'},{s:'♦',c:'orange',h:'#1E90FF'},{s:'♣',c:'green',h:'#1a6e1a'},{s:'♠',c:'blk',h:'#111111'}];
const NM={11:'J',12:'Q',13:'K',1:'A'};
function cardInner(c){if(c.jk)return JSVG;if(c.wl)return WSVG;const fk=FM[c.n];if(fk&&FIG[fk]&&FIG[fk][c.s])return FIG[fk][c.s];return numSVG(c.s,c.h,c.n);}
function dispN(c){if(c.jk)return'★';if(c.wl)return'✦';return NM[c.n]||c.n;}
function cv(c){return c.jk||c.wl?30:c.n===1?15:c.n>=11?10:c.n;}

// DECK
let UID=0;
function mk(n,s,c,h,x){return Object.assign({n,s,c,h,id:++UID},x||{});}
function makeDeck(){const d=[];SUITS.forEach(t=>{for(let n=1;n<=13;n++)d.push(mk(n,t.s,t.c,t.h));});d.push(mk(0,'★','red','#534AB7',{jk:true}));d.push(mk(0,'✦','blk','#0F6E56',{wl:true}));return d;}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
// CRITICAL: remove by id only — never by index
function rmIds(arr,ids){return arr.filter(c=>!ids.includes(c.id));}

// COMBO RULES
// Joker(jk) = solo escaleras | Grupal(wl) = solo grupos
function isGroup(cs){
  if(cs.some(c=>c.jk))return false;
  const nj=cs.filter(c=>!c.wl);
  if(!nj.length)return false;
  if(!nj.every(c=>c.n===nj[0].n))return false;
  const suits=nj.map(c=>c.s);
  return new Set(suits).size===suits.length;
}

// isRun — soporta As circular: A puede valer 1 ó 14
// Ejemplos válidos: A,2,3 | Q,K,A | K,A,2 | K,Joker,2 (Joker=A)
function isRun(cs){
  if(cs.some(c=>c.wl))return false;
  const nj=cs.filter(c=>!c.jk);
  if(!nj.length)return false;
  if(!nj.every(c=>c.s===nj[0].s))return false;
  const jks=cs.filter(c=>c.jk).length;

  function gapsFor(nums){
    const sorted=[...nums].sort((a,b)=>a-b);
    let g=0;for(let i=1;i<sorted.length;i++)g+=sorted[i]-sorted[i-1]-1;
    return g;
  }

  const baseNums=nj.map(c=>c.n);

  // intento 1: valores originales (A=1)
  if(gapsFor(baseNums)<=jks)return true;

  // intento 2: A como 14 (Q,K,A)
  if(baseNums.includes(1)){
    const with14=baseNums.map(n=>n===1?14:n);
    if(gapsFor(with14)<=jks)return true;
  }

  // intento 3: circular con A explícito — Q,K,A,2 / K,A,2 / K,A,2,3
  if(baseNums.includes(1)&&baseNums.includes(13)){
    const wrapped=baseNums.map(n=>{
      if(n===1)return 14;
      if(n<=4&&baseNums.includes(13))return n+13; // 2→15, 3→16, 4→17
      return n;
    });
    if(gapsFor(wrapped)<=jks)return true;
  }

  // intento 3b: circular sin As explícito pero con secuencia alta-baja
  // ej: Q,K + bajos (A=1 sería intento 3), o simplemente Q,K con wrap implícito
  if(baseNums.includes(13)){
    // probar si alguna combinación con 1=14 y bajos como 15,16 funciona
    const hasBajos=baseNums.some(n=>n>=1&&n<=4);
    if(hasBajos){
      const wrapped2=baseNums.map(n=>{
        if(n===1)return 14;
        if(n<=4)return n+13;
        return n;
      });
      if(gapsFor(wrapped2)<=jks)return true;
    }
  }

  // intento 4: circular con Joker representando el A — K,Joker,2
  // si hay K(13) y números bajos (2,3) sin A, el Joker puede ser el A(14)
  if(jks>0&&baseNums.includes(13)&&!baseNums.includes(1)){
    const hasLow=baseNums.some(n=>n>=2&&n<=3);
    if(hasLow){
      // tratar K=13, números bajos como 15,16 — el Joker llena el hueco en 14
      const wrapped=baseNums.map(n=>n<=3?n+13:n); // 2→15, 3→16
      if(gapsFor(wrapped)<=jks)return true;
    }
  }

  // intento 5: circular con Joker representando número bajo — K,A,Joker(=2)
  if(jks>0&&baseNums.includes(1)&&baseNums.includes(13)){
    const wrapped=baseNums.map(n=>{
      if(n===1)return 14;
      return n;
    });
    const extended=[...wrapped,15];
    if(gapsFor(extended)<=jks)return true;
  }

  // intento 6: circular donde el Joker representa el K(13)
  // ej: Q,Joker(=K),A,2 / J,Q,Joker(=K),A / Q,Joker(=K),A,2,3
  if(jks>0&&!baseNums.includes(13)){
    const hasHigh=baseNums.some(n=>n>=10&&n<=12);
    const hasAce=baseNums.includes(1);
    const hasLow=baseNums.some(n=>n>=2&&n<=5);
    if(hasHigh&&(hasAce||hasLow)){
      // A→14, bajos→n+13 para representar posición circular
      const wrapped=baseNums.map(n=>{
        if(n===1)return 14;
        if(n>=2&&n<=5)return n+13;
        return n;
      });
      if(gapsFor(wrapped)<=jks)return true;
    }
  }

  return false;
}

function validCombo(cs){return cs.length>=3&&(isGroup(cs)||isRun(cs));}
function comboType(cs){return isGroup(cs)?'grupo':'escalera';}
function canFit(comboCards,c){return validCombo([...comboCards,c]);}
function hasBothWilds(hand){return hand.some(c=>c.jk)&&hand.some(c=>c.wl);}
// Detecta si un jugador usó ambos comodines (en mano O en combos bajados)
function usedBothWilds(i){
  try{
    const handCards=S.hands[i]||[];
    const shownCards=(S.shown[i]||[]).flatMap(combo=>(combo&&combo.cards)||[]);
    const all=[...handCards,...shownCards];
    return all.some(c=>c&&c.jk)&&all.some(c=>c&&c.wl);
  }catch(e){return false;}
}

// Ordena las cartas de un combo para mostrarlo:
// - Grupos: por palo (♥♦♣♠) para que se vea limpio, comodín al final
// - Escaleras: por valor numérico, Joker en la posición lógica que le corresponde
//   Si el jugador ya tiene un orden personalizado en combo.order, respetarlo
// Calcula el valor lógico del Joker en una escalera (el número que rellena el hueco)
function jokerValue(nonJokers){
  if(!nonJokers.length)return 7;
  const hasAce=nonJokers.some(c=>c.n===1);
  const hasKing=nonJokers.some(c=>c.n===13);
  let vals=nonJokers.map(c=>(hasAce&&hasKing&&c.n===1)?14:c.n).sort((a,b)=>a-b);
  // buscar el primer hueco interno
  for(let i=1;i<vals.length;i++){
    if(vals[i]-vals[i-1]>1)return vals[i-1]+1;
  }
  // sin hueco interno: extender la secuencia
  if(vals[0]>1)return vals[0]-1;
  return vals[vals.length-1]+1;
}

function sortCombo(combo){
  if(combo.order)return combo.order;
  const cards=[...combo.cards];
  if(isGroup(cards)){
    const suitOrder={'♥':0,'♦':1,'♣':2,'♠':3};
    return cards.sort((a,b)=>{
      if(a.wl)return 1; if(b.wl)return -1;
      return(suitOrder[a.s]||0)-(suitOrder[b.s]||0);
    });
  }
  const hasJoker=cards.some(c=>c.jk);
  const nonJokers=cards.filter(c=>!c.jk);
  const hasAce=nonJokers.some(c=>c.n===1);
  const hasKing=nonJokers.some(c=>c.n===13);
  const hasLow=nonJokers.some(c=>c.n>=2&&c.n<=3); // 2 o 3 junto con K y A → circular

  // Función que asigna valor de ordenamiento a cada carta
  // detecta automáticamente si la escalera es circular (K,A,2 o K,A,2,3)
  const sortVal=c=>{
    if(c.jk)return -1; // placeholder, se reemplaza abajo
    if(hasAce&&hasKing&&hasLow){
      // escalera circular: K=13, A=14, 2=15, 3=16...
      if(c.n===1)return 14;
      if(c.n<=3)return c.n+13; // 2→15, 3→16
      return c.n;
    }
    if(hasAce&&hasKing){
      // Q,K,A — As al final como 14
      return c.n===1?14:c.n;
    }
    return c.n; // A,2,3 — As como 1
  };

  if(!hasJoker){
    return cards.sort((a,b)=>sortVal(a)-sortVal(b));
  }
  // con Joker: calcular su valor lógico dentro de la secuencia
  const jv=jokerValue(nonJokers);
  // jokerValue devuelve el número "real" (ej 11 para J); convertirlo al mismo espacio
  const jSortVal=(()=>{
    if(hasAce&&hasKing&&hasLow&&jv>=2&&jv<=3)return jv+13;
    if(hasAce&&hasKing&&jv===1)return 14;
    return jv;
  })();
  return cards.sort((a,b)=>{
    const av=a.jk?jSortVal:sortVal(a);
    const bv=b.jk?jSortVal:sortVal(b);
    return av-bv;
  });
}

// STATE
// hands[p]  = cartas EN MANO (las que pueden sumar como sobrantes)
// shown[p]  = combos ya mostrados en mesa (NO suman como sobrantes)
// Estos dos arrays son MUTUAMENTE EXCLUSIVOS — una carta nunca aparece en ambos
const S={
  deck:[],disc:[],
  hands:[[],[],[]],
  shown:[[],[],[]],
  sel:[],cur:0,np:3,
  phase:'idle',
  over:false,golpBy:-1,
  msg:'',comboThisTurn:false,
  dragId:0,
  _revOrd:null,_revIdx:0,
};
function selCards(){return S.hands[0].filter(c=>S.sel.includes(c.id));}
function clrSel(){S.sel=[];}
function togSel(id){const i=S.sel.indexOf(id);if(i>=0)S.sel.splice(i,1);else S.sel.push(id);}

// SHUFFLE/CUT/DEAL
// ══════════════════════════════════════
// Valida si el Joker en la posición `pos` del array `orderedCards` es lógico.
// Lógico = el número que representaría es consecutivo con sus vecinos.
function isJokerPosValid(orderedCards,jokerPos){
  // extraer no-jokers con sus posiciones en el orden propuesto
  const nonJ=[];
  orderedCards.forEach((c,i)=>{if(!c.jk)nonJ.push({c,i});});
  if(!nonJ.length)return true;

  const hasAce=nonJ.some(x=>x.c.n===1);
  const hasKing=nonJ.some(x=>x.c.n===13);
  const val=c=>(hasAce&&hasKing&&c.n===1)?14:c.n;

  // vecino izquierdo y derecho del Joker en el orden propuesto
  const left=nonJ.filter(x=>x.i<jokerPos).slice(-1)[0];
  const right=nonJ.filter(x=>x.i>jokerPos)[0];

  if(left&&right){
    // debe haber exactamente 1 hueco entre ellos (el Joker lo rellena)
    return val(right.c)-val(left.c)===2;
  }
  if(left&&!right){
    // Joker al final: el valor que representaría es val(left)+1, debe ser ≤13 (o ≤14 si hay circular)
    const jv=val(left.c)+1;
    return jv<=13||(hasAce&&hasKing&&jv===14);
  }
  if(!left&&right){
    // Joker al inicio: valor representado = val(right)-1, debe ser ≥1 (o ≥2 si A ya está)
    const jv=val(right.c)-1;
    return jv>=1;
  }
  return true;
}

// intenta reubicar el Joker en nueva posición; si no es válida, muestra mensaje y no cambia
function tryJokerMove(combo,fromIdx,toIdx){
  if(fromIdx===toIdx)return;
  const ord=combo.order?[...combo.order]:[...sortCombo(combo)];
  const newOrd=[...ord];
  const[joker]=newOrd.splice(fromIdx,1);
  newOrd.splice(toIdx,0,joker);
  if(isJokerPosValid(newOrd,toIdx)){
    combo.order=newOrd;
    sndCard(0.3);
  } else {
    S.msg='El Joker no puede ir ahí — no formaría una secuencia válida.';
  }
  redraw();
}
function playPenaltySound(){
  try{
    const ctx=getCtx();
    [200,160,120].forEach((freq,i)=>{
      const osc=ctx.createOscillator();const g=ctx.createGain();
      const t=ctx.currentTime+i*0.12;
      osc.type='sawtooth';osc.frequency.setValueAtTime(freq,t);
      osc.frequency.exponentialRampToValueAtTime(freq*0.5,t+0.4);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      osc.connect(g);g.connect(ctx.destination);osc.start(t);osc.stop(t+0.5);
    });
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.12,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
    const src=ctx.createBufferSource();const ng=ctx.createGain();
    const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=200;
    ng.gain.value=1.5;src.buffer=buf;src.connect(f);f.connect(ng);ng.connect(ctx.destination);src.start();
  }catch(e){}
}

function showPenaltyAnimation(penalties,callback){
  if(!penalties.length){callback();return;}
  playPenaltySound();
  const G=$('G');
  G.style.animation='penaltyShake .5s ease-out';
  G.addEventListener('animationend',()=>{G.style.animation='';},{once:true});
  let idx=0;

    ov.innerHTML=`

    G.appendChild(ov);

function detectPenalties(){
  const scores=S.hands.map(h=>h.reduce((a,c)=>a+cv(c),0));
  const adj=scores.map((s,i)=>s+(usedBothWilds(i)?60:0));
  const min=Math.min(...adj);
  const winners=adj.map((s,i)=>s===min?i:-1).filter(i=>i>=0);
  const tie=winners.length>1;
  const gp=S.golpBy;const gWon=gp>=0&&adj[gp]===min&&!tie;
  if(tie)return [];
  const penalties=[];
  for(let i=0;i<S.np;i++){
    if(winners.includes(i))continue;
    const tieneComodines=usedBothWilds(i);
    const golpoSinGanar=gp===i&&!gWon;
    if(golpoSinGanar||tieneComodines){
      const reason=golpoSinGanar?'declaró GOLPEADO pero no ganó':
        tieneComodines?'terminó con los 2 comodines':'';
      penalties.push({name:PNAME(i),reason,color:PCOLOR[i]});
    }
  }
  return penalties;
}

// ── CALCULAR Y REGISTRAR PAGOS AL FINAL ──
function calcPayments(winners,adj,tie,gp,gWon){
  if(tie||BET===0)return [];
  const winner=winners[0];
  const payments=[];

  // obtener/inicializar banco
  let bankMatrix;
  if(MP.mode==='multi'){
    // siempre leer fresh del localStorage para tener el acumulado correcto
    BANK=loadBank();
    if(!BANK||!BANK.matrix){
      BANK={matrix:Array.from({length:S.np},()=>Array(S.np).fill(0)),names:[]};
    }
    // asegurar que la matriz tiene el tamaño correcto para S.np jugadores
    for(let r=0;r<S.np;r++){
      if(!BANK.matrix[r])BANK.matrix[r]=Array(S.np).fill(0);
      while(BANK.matrix[r].length<S.np)BANK.matrix[r].push(0);
    }
    bankMatrix=BANK.matrix;
    BANK.names=Array.from({length:S.np},(_,i)=>PNAME(i));
  } else {
    if(!BANK)BANK=loadBank();
    if(!BANK||!Array.isArray(BANK))BANK=Array.from({length:S.np},()=>Array(S.np).fill(0));
    bankMatrix=BANK;
  }

  for(let i=0;i<S.np;i++){
    if(i===winner)continue;
    const tieneComodines=usedBothWilds(i);
    const golpoSinGanar=gp===i&&!gWon;
    const esPenalizado=golpoSinGanar||tieneComodines;
    const monto=esPenalizado?BET*2:BET;
    const razon=golpoSinGanar?'golpeó sin ganar':tieneComodines?'2 comodines':'pierde';
    payments.push({from:i,to:winner,amount:monto,reason:razon});
    // solo el host (o modo solo) actualiza el banco para evitar duplicación
    if(MP.mode!=='multi'||MP.isHost){
      if(!bankMatrix[i])bankMatrix[i]=Array(S.np).fill(0);
      bankMatrix[i][winner]=(bankMatrix[i][winner]||0)+monto;
    }
  }
  // solo guardar si es host o modo solo
  if(MP.mode!=='multi'||MP.isHost)saveBank(BANK);
  return payments;
}

function dealCards(poolA,poolB){
  S.phase='deal';S.deck=shuf([...poolB]);S.disc=[];
  S.hands=Array.from({length:S.np},()=>[]);
  S.shown=Array.from({length:S.np},()=>[]);
  const counts=Array.from({length:S.np},(_,i)=>i===0?10:9);
  const given=Array.from({length:S.np},()=>0);
  const seq=[];let pool=[...poolA],p=0;
  const total=counts.reduce((a,b)=>a+b,0);
  while(seq.length<total){
    if(given[p]<counts[p]){const card=pool.length?pool.shift():S.deck.pop();seq.push({p,card});given[p]++;}
    p=(p+1)%S.np;
  }
  pool.forEach(c=>S.deck.push(c));shuf(S.deck);

  if(MP.mode==='multi'){
    const dealState={
      fase:'dealing',np:S.np,jugadores:MP._jugadores||[],apuesta:BET,host:MP._hostId||'',
      deck:S.deck,disc:[],hands:Array.from({length:S.np},()=>[]),
      shown:Array.from({length:S.np},()=>[]),
      sel:[],cur:0,phase:'dealing',dealSeq:seq,
      over:false,golpBy:-1,msg:'Repartiendo...',comboThisTurn:false,
      _revOrd:null,_revIdx:0,_revPid:-1,_revSel:[],_fitTarget:null,_fitCandidates:null,ts:Date.now()
    };
    sbSet(MP.salaId,dealState).then(()=>{
      S.np=dealState.np;
      S.hands=Array.from({length:S.np},()=>[]);
      S.shown=Array.from({length:S.np},()=>[]);
      S.deck=dealState.deck;S.disc=[];BET=dealState.apuesta;
      animateDeal(seq,()=>{
        S.phase='first_discard';
        S.msg='Primer turno: seleccioná 1 carta para descartar y comenzar.';
        redraw();mpPublicarEstado();
      });
    }).catch(e=>showError('Error: '+e.message));
  } else {
    animateDeal(seq,()=>{
      S.phase='first_discard';
      S.msg='Primer turno: seleccioná 1 carta para descartar y comenzar.';
      redraw();
    });
  }
}

function animateDeal(seq,onDone){
  S.msg='Repartiendo...';redraw();
  const dkEl=$('DK');
  if(!dkEl){if(onDone)onDone();return;}
  const dkR=dkEl.getBoundingClientRect();
  const ox=dkR.left+dkR.width/2,oy=dkR.top+dkR.height/2;
  const st=getComputedStyle(document.documentElement);
  const cw=parseFloat(st.getPropertyValue('--cw'))||50,ch=parseFloat(st.getPropertyValue('--ch'))||74;
  function tgt(pid){
    if(pid===0){const r=$('PH').getBoundingClientRect();return{x:r.left+10,y:r.top+r.height/2};}
    const b=$('BR').children[pid-1];if(!b)return{x:ox,y:oy};
    const r=b.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};
  }
  let idx=0;
  function next(){
    if(idx>=seq.length){setTimeout(()=>{if(onDone)onDone();},300);return;}
    const{p,card}=seq[idx];S.hands[p].push(card);
    const fly=document.createElement('div');fly.className='fly';
    fly.style.left=(ox-cw/2)+'px';fly.style.top=(oy-ch/2)+'px';
    document.body.appendChild(fly);
    const t=tgt(p);
    requestAnimationFrame(()=>{fly.style.transform=`translate(${t.x-ox+cw/2}px,${t.y-oy+ch/2}px) scale(.8)`;fly.style.opacity='.6';});
    setTimeout(()=>{fly.remove();sndCard(0.2);redraw();idx++;next();},115);
  }
  setTimeout(next,200);
}

// Ordenar mano — cicla entre 3 modos
let _sortMode=0;
function sortHand(){
  if(!S.hands[0].length)return;
  _sortMode=(_sortMode+1)%3;
  const h=S.hands[0];
  const suitOrder={'♥':0,'♦':1,'♣':2,'♠':3};
  const val=c=>c.jk?0:c.wl?0:c.n===1?14:c.n; // As alto para ordenar

  if(_sortMode===1){
    // Modo 1: por palo luego número
    h.sort((a,b)=>{
      const sd=(suitOrder[a.s]||0)-(suitOrder[b.s]||0);
      return sd!==0?sd:val(a)-val(b);
    });
    S.msg='Mano ordenada por palo.';
  } else if(_sortMode===2){
    // Modo 2: por número luego palo
    h.sort((a,b)=>{
      const nd=val(a)-val(b);
      return nd!==0?nd:(suitOrder[a.s]||0)-(suitOrder[b.s]||0);
    });
    S.msg='Mano ordenada por número.';
  } else {
    // Modo 0: intentar agrupar combos posibles primero
    // separar cartas que forman combos de las que no
    const used=new Set();
    const groups=[];
    // buscar tríos/grupos
    for(let i=0;i<h.length;i++)for(let j=i+1;j<h.length;j++)for(let k=j+1;k<h.length;k++){
      if(!used.has(i)&&!used.has(j)&&!used.has(k)&&validCombo([h[i],h[j],h[k]])){
        groups.push([h[i],h[j],h[k]]);used.add(i);used.add(j);used.add(k);
      }
    }
    const rest=h.filter((_,i)=>!used.has(i)).sort((a,b)=>val(a)-val(b));
    S.hands[0]=[...groups.flat(),...rest];
    S.msg='Mano ordenada: combos primero.';
  }
  sndSelect();
  drawHand();drawMsg();
}

}

let _actx=null;
function getCtx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==='suspended')_actx.resume();
  return _actx;
}

// Sonido de carta — seco y corto
function sndCard(vol=0.4){
  try{
    const ctx=getCtx();
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*0.8;
    const src=ctx.createBufferSource();
    const g=ctx.createGain();
    const f=ctx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=3200;f.Q.value=0.8;
    src.buffer=buf;g.gain.value=vol;
    src.connect(f);f.connect(g);g.connect(ctx.destination);
    src.start();
  }catch(e){}
}

// Sonido de barajar — múltiples cartas rápidas
function sndShuffle(){
  try{
    for(let i=0;i<8;i++)setTimeout(()=>sndCard(0.25+Math.random()*0.2),i*60+Math.random()*30);
  }catch(e){}
}

// Sonido de corte del mazo
function sndCut(){
  try{
    const ctx=getCtx();
    // dos golpes secos
    [0,0.12].forEach(delay=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
      const src=ctx.createBufferSource();
      const g=ctx.createGain();
      const f=ctx.createBiquadFilter();
      f.type='lowpass';f.frequency.value=1800;
      g.gain.value=0.5;
      src.buffer=buf;src.connect(f);f.connect(g);g.connect(ctx.destination);
      src.start(ctx.currentTime+delay);
    });
  }catch(e){}
}

// Sonido de combo bajado — acorde positivo
function sndCombo(){
  try{
    const ctx=getCtx();
    [261.6,329.6,392].forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const g=ctx.createGain();
      const t=ctx.currentTime+i*0.04;
      osc.type='sine';osc.frequency.value=freq;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.18,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.connect(g);g.connect(ctx.destination);
      osc.start(t);osc.stop(t+0.4);
    });
  }catch(e){}
}

// Sonido de tomar carta del mazo o descarte
function sndDraw(){sndCard(0.35);}

// Sonido de descartar
function sndDiscard(){
  try{
    const ctx=getCtx();
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);
    const src=ctx.createBufferSource();
    const g=ctx.createGain();g.gain.value=0.3;
    const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=2000;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(ctx.destination);
    src.start();
  }catch(e){}
}

// Sonido de golpeado — puño en la mesa
function playGolpeSound(){
  try{
    const ctx=getCtx();
    const bufSize=ctx.sampleRate*0.18;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,2.2);
    const noise=ctx.createBufferSource();
    const ng=ctx.createGain();
    const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=300;
    ng.gain.setValueAtTime(2.2,ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
    noise.buffer=buf;noise.connect(f);f.connect(ng);ng.connect(ctx.destination);
    noise.start();
    [[55,'sine',1.4,0.005,0.3,0.35],[110,'triangle',0.9,0.003,0.22,0.28],[700,'square',0.14,0.001,0.07,0.09],[45,'sine',0.6,0.012,0.35,0.4,0.09]].forEach(([fr,tp,vo,at,dc,dr,dl=0])=>{
      const osc=ctx.createOscillator();const g=ctx.createGain();const t=ctx.currentTime+dl;
      osc.type=tp;osc.frequency.setValueAtTime(fr,t);osc.frequency.exponentialRampToValueAtTime(fr*0.3,t+dr);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vo,t+at);g.gain.exponentialRampToValueAtTime(0.001,t+dc);
      osc.connect(g);g.connect(ctx.destination);osc.start(t);osc.stop(t+dr);
    });
  }catch(e){}
}

function actDraw(){
  if(S.over||S.cur!==0||S.phase!=='play')return;
  if(!S.deck.length){
    // mazo vacío → refill con descarte y barajar
    if(!S.disc.length){S.msg='¡No quedan cartas!';drawMsg();return;}
    refillDeck(()=>actDraw());
    return;
  }
  S.hands[0].push(S.deck.pop());
  sndDraw();
  clrSel();S.comboThisTurn=false;S.phase='drew';
  mpPublicarEstado();
  S.msg=miNom()+': Tomaste una carta. Mostrá 1 combo o descartá 1.';
  redraw();
}

function actTakeDisc(){
  if(S.over||S.cur!==0||S.phase!=='play'||!S.disc.length)return;
  const top=S.disc[S.disc.length-1];
  // verificar si puede formar combo ANTES de tomarla
  const hand=S.hands[0];
  let canForm=false;
  outer:for(let i=0;i<hand.length;i++)
    for(let j=i+1;j<hand.length;j++)
      if(validCombo([hand[i],hand[j],top])){canForm=true;break outer;}
  if(!canForm){
    S.msg=miNom()+': No podés formar combo con esa carta. Tomá del mazo.';
    drawMsg();drawActs();return;
  }
  S.disc.pop(); sndDraw(); // quita del pile + sonido
  S.hands[0].push(top);     // agrega a la mano
  clrSel();S.sel=[top.id];  // pre-selecciona la carta tomada
  S.comboThisTurn=false;S.phase='took_discard';
  S.msg=miNom()+': Tomaste el descarte. Seleccioná 3+ cartas y mostrá combo.';
  redraw();
}

function actShowCombo(){
  const cs=selCards();
  if(cs.length<3){S.msg=miNom()+': Seleccioná al menos 3 cartas.';drawMsg();drawActs();return;}
  if(!validCombo(cs)){S.msg='No forman grupo ni escalera válida.';drawMsg();drawActs();return;}
  // ── quitar de hand, agregar a shown ──  (NUNCA en los dos al mismo tiempo)
  const ids=cs.map(c=>c.id);
  const _c0={cards:[...cs],type:comboType(cs)};_c0.order=sortCombo(_c0);S.shown[0].push(_c0);
  S.hands[0]=rmIds(S.hands[0],ids);
  sndCombo();clrSel();S.comboThisTurn=true;S.phase="showed_combo";mpPublicarEstado();
  S.msg=miNom()+': ¡Combo mostrado! Seleccioná 1 carta para descartar.';
  redraw();
}

function actDiscard(){
  const cs=selCards();
  if(cs.length!==1){S.msg=miNom()+': Seleccioná 1 carta para descartar.';drawMsg();drawActs();return;}
  const card=cs[0];
  // IMPORTANTE: quitar de mano ANTES de publicar
  S.hands[0]=rmIds(S.hands[0],[card.id]);
  S.disc.push(card);
  sndDiscard();
  clrSel();S.comboThisTurn=false;
  passTurn();
  mpPublicarEstado(); // publicar después de passTurn que actualiza S.cur
}

// TURN FLOW
function passTurn(){
  clrSel();S.comboThisTurn=false;
  S.cur=(S.cur+1)%S.np;
  if(S.over)return;
  if(MP.mode==='multi'){
    // en multi: publicar estado y esperar que el otro jugador actúe
    const esMiTurno=S.cur===MP.mySlot;
    S.phase='play';
    S.msg=esMiTurno?'Tu turno: ¡GOLPEADO! · tomar descarte · tomar del mazo.':
      `Turno de ${PNAME(S.cur)}...`;
    mpPublicarEstado();
    redraw();
  } else {
    // modo solo: turnos normales con bots
    if(S.cur===0){S.phase='play';S.msg='Tu turno: ¡GOLPEADO! · tomar descarte · tomar del mazo.';redraw();}
    else{S.phase='bot';S.msg=`Bot ${S.cur} piensa...`;redraw();setTimeout(()=>botTurn(S.cur),850);}
  }
}

// BOT
function botTurn(pid){
  if(S.over||S.cur!==pid)return;
  const h=S.hands[pid];
  if(h.length<=3){
    S.golpBy=pid;
    showGolpeAnimation(`${PNAME(pid)} declaró GOLPEADO`,()=>startReveal());
    return;
  }
  // intentar tomar descarte solo si puede formar combo con él (obligatorio mostrarlo)
  if(S.disc.length){
    const top=S.disc[S.disc.length-1];
    for(let i=0;i<h.length;i++)for(let j=i+1;j<h.length;j++){
      if(validCombo([h[i],h[j],top])){
        const a=h[i],b=h[j];
        S.disc.pop();
        S.hands[pid]=rmIds(S.hands[pid],[a.id,b.id]);
        const _ct={cards:[a,b,top],type:comboType([a,b,top])};_ct.order=sortCombo(_ct);S.shown[pid].push(_ct);
        S.msg=`Bot ${pid} tomó el descarte y mostró ${comboType([a,b,top])}.`;
        // NO llama botShowOne — no muestra más combos voluntariamente
        botDiscard(pid);return;
      }
    }
  }
  // tomar del mazo — si está vacío, refill con descarte
  if(!S.deck.length&&S.disc.length){
    S.deck=[...S.disc];S.disc=[];
    for(let i=S.deck.length-1;i>0;i--){const j=0|Math.random()*(i+1);[S.deck[i],S.deck[j]]=[S.deck[j],S.deck[i]];}
    S.msg=`¡Mazo rearmado! Bot ${pid} toma del mazo.`;
  }
  if(S.deck.length)S.hands[pid].push(S.deck.pop());
  // NO llama botShowOne — guarda sus combos hasta el GOLPEADO
  botDiscard(pid);
}

function botShowOne(pid){
  const h=S.hands[pid];
  for(let i=0;i<h.length;i++)for(let j=i+1;j<h.length;j++)for(let k=j+1;k<h.length;k++){
    if(validCombo([h[i],h[j],h[k]])){
      const a=h[i],b=h[j],cc=h[k];
      S.hands[pid]=rmIds(S.hands[pid],[a.id,b.id,cc.id]);
      const _ck={cards:[a,b,cc],type:comboType([a,b,cc])};_ck.order=sortCombo(_ck);S.shown[pid].push(_ck);
      return;
    }
  }
}

function botDiscard(pid){
  const h=S.hands[pid];
  if(!h.length){passTurn();return;}

  // si tiene ambos comodines, descartar uno
  if(hasBothWilds(h)){
    const drop=h.find(c=>c.jk)||h.find(c=>c.wl);
    S.disc.push(drop);S.hands[pid]=rmIds(S.hands[pid],[drop.id]);
    S.msg=`Bot ${pid} descartó un comodín.`;passTurn();return;
  }

  // descartar la carta de mayor valor
  const worst=h.reduce((a,b)=>cv(a)>=cv(b)?a:b);
  S.disc.push(worst);S.hands[pid]=rmIds(S.hands[pid],[worst.id]);
  if(!S.msg.includes('tomó'))S.msg=`Bot ${pid} descartó.`;
  passTurn();
}

// GOLPEADO → revelación en la misma mesa
function startReveal(){
  S.phase='golpeado_reveal';
  const gp=S.golpBy;
  S._revOrd=[];
  for(let i=1;i<S.np;i++)S._revOrd.push((gp+i)%S.np);
  S._revOrd.push(gp);
  S._revIdx=0;S._revPid=-1;S._revSel=new Set();
  S.msg='¡GOLPEADO declarado por '+PNAME(gp)+'! Mostrando juegos...';
  redraw();
  if(MP.mode==='multi'){
    mpPublicarEstadoConFase('golpeado_reveal');
    showGolpeAnimation('¡'+PNAME(0)+' declaró GOLPEADO!',()=>{
      // esperar un momento después de la animación antes de mostrar cartas
      setTimeout(()=>revealNext(),600);
    });
  } else {
    setTimeout(revealNext,800);
  }
}

function revealNext(){
  if(!S._revOrd)return;
  if(S._revIdx>=S._revOrd.length){
    clearRevTimer(); // limpiar timer al terminar revelación
    S.phase='mesa_final';S._revPid=-1;
    S.msg='¡Todos mostraron su juego! Presioná Ver resultados.';
    redraw(); // muestra botón "Ver resultados" inmediatamente
    if(MP.mode==='multi')setTimeout(()=>mpPublicarEstado(),50);
    // penalizaciones como overlay encima, no bloquean el botón
    const penalties=detectPenalties();
    if(penalties.length){
      setTimeout(()=>showPenaltyAnimation(penalties,()=>{redraw();}),600);
    }
    return;
  }
  const pid=S._revOrd[S._revIdx];
  S._revPid=pid;S._revSel=new Set();

  if(MP.mode==='multi'){
    if(pid===0){
      S.msg='Tu turno de mostrar — seleccioná tus cartas para bajar combos o encajar.';
      redraw();
      mpPublicarEstado();
      startRevTimer(); // arrancar temporizador solo para el jugador activo
    } else {
      S.msg=PNAME(pid)+' está mostrando su juego...';
      clearRevTimer();
      redraw();
      mpPublicarEstado();
    }
  } else {
    if(pid!==0){
      botShowOne(pid);autoFit(pid);
      const pts=S.hands[pid].reduce((a,c)=>a+cv(c),0);
      S.msg=PNAME(pid)+' mostró su juego — sobrantes: '+pts+' pts.';
      S._revIdx++;redraw();setTimeout(revealNext,1400);
    } else {
      S.msg='Tu turno de mostrar — seleccioná tus cartas para bajar combos o encajar.';
      redraw();
      startRevTimer(); // arrancar temporizador en modo solo también
    }
  }
}

function doListo(){
  clearRevTimer(); // cancelar temporizador al presionar listo
  const pts=S.hands[0].reduce((a,c)=>a+cv(c),0);
  const miNombre=MP.mode==='multi'?(MP.myName||'Tú'):'Tú';
  S._revSel=new Set();S._revIdx++;S._revPid=-1;
  S.msg=pts===0?'¡'+miNombre+' sin sobrantes! Esperando...':miNombre+': '+pts+' pts sobrantes.';
  redraw();
  if(MP.mode==='multi'){
    // revealNext() ya llama mpPublicarEstado() internamente
    revealNext();
  } else {
    setTimeout(revealNext,600);
  }
}


function autoFit(pid){
  const all=S.shown.flat();
  let ch=true;
  while(ch){ch=false;
    for(let ci=0;ci<all.length&&!ch;ci++)
      for(let hi=0;hi<S.hands[pid].length&&!ch;hi++)
        if(canFit(all[ci].cards,S.hands[pid][hi])){
          all[ci].cards.push(S.hands[pid][hi]);
          all[ci].order=null;
          S.hands[pid]=rmIds(S.hands[pid],[S.hands[pid][hi].id]);
          ch=true;
        }
  }
}

// acciones en revelación (jugador humano en mesa)
// sonido de selección de carta
function sndSelect(){
  try{
    const ctx=getCtx();
    const osc=ctx.createOscillator();const g=ctx.createGain();
    osc.type='sine';osc.frequency.value=880;
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.15,ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
    osc.connect(g);g.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.1);
  }catch(e){}
}
// sonido de soltar/deseleccionar carta
function sndDrop(){
  try{
    const ctx=getCtx();
    const osc=ctx.createOscillator();const g=ctx.createGain();
    osc.type='sine';osc.frequency.value=440;
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.12,ctx.currentTime+0.008);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.07);
    osc.connect(g);g.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.08);
  }catch(e){}
}

// estado de encaje interactivo
// S._fitTarget = id de carta seleccionada para encajar (modo: esperando toque en combo)
// S._fitCandidates = set de índices de combos donde puede encajar

function revealToggle(id){
  // si estamos en modo encaje, cancelarlo
  if(S._fitTarget){S._fitTarget=null;S._fitCandidates=null;redraw();return;}
  const wasSel=S._revSel.has(id);
  if(wasSel){S._revSel.delete(id);sndDrop();}
  else{S._revSel.add(id);sndSelect();}
  redraw();
}

function revealBajar(){
  const sel=S.hands[0].filter(c=>S._revSel.has(c.id));
  if(sel.length<3){S.msg='Seleccioná mín. 3 cartas para bajar un combo.';redraw();return;}
  if(!validCombo(sel)){S.msg='Esas cartas no forman grupo ni escalera válida.';redraw();return;}
  const _cs={cards:[...sel],type:comboType(sel)};_cs.order=sortCombo(_cs);S.shown[0].push(_cs);
  S.hands[0]=rmIds(S.hands[0],sel.map(c=>c.id));
  S._revSel=new Set();S._fitTarget=null;S._fitCandidates=null;
  sndCombo();S.msg=`¡Combo bajado! (${comboType(sel)}) — seguí o presioná Listo.`;
  if(MP.mode==='multi')mpPublicarEstado();
  redraw();
}

// ENCAJAR INTERACTIVO:
// 1. Seleccionás 1 carta → tocás "Encajar en mesa"
// 2. Si hay >1 combo posible → los combos se resaltan y esperás que toques el destino
// 3. Si hay solo 1 → encaja directo
function revealEncajar(){
  const sel=S.hands[0].filter(c=>S._revSel.has(c.id));
  if(!sel.length){S.msg='Seleccioná al menos 1 carta para encajar.';redraw();return;}

  const all=S.shown.flat();
  let anyFit=false;

  sel.forEach(card=>{
    // encontrar combos donde puede encajar
    const fits=all.map((combo,ci)=>canFit(combo.cards,card)?ci:-1).filter(i=>i>=0);
    if(!fits.length)return;
    if(fits.length===1){
      // único destino → encajar directo
      doFitCard(card,all[fits[0]]);
      anyFit=true;
    } else {
      // múltiples destinos → modo selección de combo
      S._fitTarget=card.id;
      S._fitCandidates=new Set(fits);
      S._revSel=new Set([card.id]); // mantener solo esta seleccionada
      S.msg='Toca el combo destino donde querés encajar la carta (resaltados en amarillo).';
      anyFit=true;
    }
  });

  if(!anyFit){S.msg='Esa carta no encaja en ningún combo de la mesa.';}
  if(MP.mode==='multi')mpPublicarEstado();
  redraw();
}

// encaja una carta en un combo específico
function doFitCard(card,combo){
  combo.cards.push(card);
  combo.order=null;
  S.hands[0]=rmIds(S.hands[0],[card.id]);
  S._revSel.delete(card.id);
  sndCard(0.4);
  // si era el Joker, ofrecer reposicionarlo
  if(card.jk){
    S.msg='¡Joker encajado! Arrastralo dentro del combo para elegir su posición.';
  }
}

// llamado cuando el jugador toca un combo en modo encaje
function fitToCombo(comboRef){
  if(!S._fitTarget)return;
  const card=S.hands[0].find(c=>c.id===S._fitTarget);
  if(!card){S._fitTarget=null;S._fitCandidates=null;redraw();return;}
  if(!canFit(comboRef.cards,card)){
    S.msg='Ese combo no acepta esta carta.';
    S._fitTarget=null;S._fitCandidates=null;redraw();return;
  }
  doFitCard(card,comboRef);
  S._fitTarget=null;S._fitCandidates=null;
  redraw();
}

function mkBack(){const e=document.createElement('div');e.className='card back';e.innerHTML='<div style="grid-row:1/-1;overflow:hidden"><div class="cbk" style="height:100%"></div></div>';return e;}

function mkFace(c,selectable){
  const e=document.createElement('div');
  e.className=`card ${c.c}${c.jk?' jkcard':''}${c.wl?' wlcard':''}${selectable&&S.sel.includes(c.id)?' sel':''}`;
  e.dataset.cid=c.id;
  const L=dispN(c);
  // color de palo para las esquinas — diferencia trébol(verde) de pica(negro)
  const suitColor=c.h||'#111';
  const suitStyle=`color:${suitColor}`;
  const t=document.createElement('div');t.className='cn';t.innerHTML=`<span class="cnn" style="${suitStyle}">${L}</span><span class="cns" style="${suitStyle}">${c.s}</span>`;e.appendChild(t);
  const cc=document.createElement('div');cc.className='cc';cc.innerHTML=cardInner(c);e.appendChild(cc);
  const b=document.createElement('div');b.className='cn b';b.innerHTML=`<span class="cnn" style="${suitStyle}">${L}</span><span class="cns" style="${suitStyle}">${c.s}</span>`;e.appendChild(b);
  if(selectable){
    e.classList.add('draggable'); // permite drag sin interferir con scroll
    e.addEventListener('click',()=>actToggle(c.id));

    // ── DESKTOP DRAG ──
    e.draggable=true;
    e.addEventListener('dragstart',ev=>{S.dragId=c.id;e.style.opacity='.35';ev.dataTransfer.effectAllowed='move';});
    e.addEventListener('dragend',()=>{S.dragId=0;e.style.opacity='';document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));});
    e.addEventListener('dragover',ev=>{ev.preventDefault();e.classList.add('drag-over');});
    e.addEventListener('dragleave',()=>e.classList.remove('drag-over'));
    e.addEventListener('drop',ev=>{
      ev.preventDefault();e.classList.remove('drag-over');
      if(!S.dragId||S.dragId===c.id)return;
      const hd=S.hands[0];
      const fi=hd.findIndex(x=>x.id===S.dragId),ti=hd.findIndex(x=>x.id===c.id);
      if(fi<0||ti<0)return;
      const[item]=hd.splice(fi,1);hd.splice(fi<ti?ti-1:ti,0,item);
      S.dragId=0;drawHand();
    });

    // ── MOBILE TOUCH DRAG con carta fantasma ──
    let touchStartX=0,touchStartY=0,ghost=null,didMove=false;

    // limpieza reutilizable — elimina fantasma en cualquier caso
    const cleanGhost=()=>{
      if(ghost){ghost.remove();ghost=null;}
      document.querySelectorAll('#GHOST').forEach(g=>g.remove());
      e.style.opacity='';
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    };

    e.addEventListener('touchstart',ev=>{
      cleanGhost(); // limpiar cualquier fantasma anterior
      touchStartX=ev.touches[0].clientX;
      touchStartY=ev.touches[0].clientY;
      S.dragId=c.id;
      didMove=false;
    },{passive:true});

    e.addEventListener('touchmove',ev=>{
      const cx=ev.touches[0].clientX,cy=ev.touches[0].clientY;
      const dx=Math.abs(cx-touchStartX),dy=Math.abs(cy-touchStartY);
      // si se mueve más horizontal que vertical → es drag de carta, no scroll
      if(dx>dy&&dx>4){
        // bloquear scroll del hwrap para que el drag funcione
        const hw=e.closest('.hwrap');if(hw)hw.classList.add('dragging');
      }
      if(!didMove&&(dx>8||dy>8)){
        didMove=true;
        sndSelect();
        ghost=document.createElement('div');
        ghost.className=`card ${c.c}`;
        ghost.id='GHOST';
        const L=dispN(c);
        ghost.innerHTML=`<div class="cn"><span class="cnn">${L}</span><span class="cns">${c.s}</span></div><div class="cc">${cardInner(c)}</div><div class="cn b"><span class="cnn">${L}</span><span class="cns">${c.s}</span></div>`;
        const cw2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cw'));
        const ch2=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ch'));
        ghost.style.cssText=`position:fixed;z-index:600;pointer-events:none;opacity:.85;transform:scale(1.1) rotate(3deg);transition:none;box-shadow:0 8px 24px rgba(0,0,0,.6);top:${cy-ch2/2}px;left:${cx-cw2/2}px`;
        document.body.appendChild(ghost);
        e.style.opacity='.3';
      }
      if(didMove&&ghost){
        const cw=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cw'));
        const ch=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ch'));
        ghost.style.left=(cx-cw/2)+'px';
        ghost.style.top=(cy-ch/2)+'px';
        document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
        const tg=[...document.elementsFromPoint(cx,cy)].find(el=>el.dataset?.cid&&Number(el.dataset.cid)!==c.id);
        if(tg)tg.classList.add('drag-over');
      }
    },{passive:true});

    // touchcancel: iOS interrumpe el gesto (notificación, scroll, cambio de app)
    e.addEventListener('touchcancel',()=>{
      document.querySelectorAll('.hwrap.dragging').forEach(h=>h.classList.remove('dragging'));
      cleanGhost();S.dragId=0;didMove=false;
    },{passive:true});

    e.addEventListener('touchend',ev=>{
      // restaurar scroll del contenedor
      document.querySelectorAll('.hwrap.dragging').forEach(h=>h.classList.remove('dragging'));
      if(!didMove){cleanGhost();S.dragId=0;return;}
      // detectar destino ANTES de limpiar
      const cx=ev.changedTouches[0].clientX,cy=ev.changedTouches[0].clientY;
      // ocultar fantasma y restaurar opacidad para que elementsFromPoint funcione
      if(ghost)ghost.style.display='none';
      e.style.opacity='1';
      const tg=[...document.elementsFromPoint(cx,cy)].find(el=>el.dataset?.cid&&Number(el.dataset.cid)!==c.id);
      cleanGhost();
      if(tg?.dataset?.cid){
        const tId=Number(tg.dataset.cid);
        const hd=S.hands[0];
        const fi=hd.findIndex(x=>x.id===S.dragId),ti=hd.findIndex(x=>x.id===tId);
        if(fi>=0&&ti>=0){const[item]=hd.splice(fi,1);hd.splice(fi<ti?ti-1:ti,0,item);sndDrop();}
      }
      S.dragId=0;drawHand();
    },{passive:true});  }
  return e;
}

    nameSpan.innerHTML=`${active?'<span class="adot"></span>':''}${revealing?'<span class="adot"></span>':''}<span style="color:${PCOLOR[i]}">${PNAME(i)}</span>`;
    nm.appendChild(nameSpan);
    if(BET>0)nm.appendChild(mkChip(BET,22));
    d.appendChild(nm);
    const bc=document.createElement('div');bc.className='bcards';
    const yaRevelo=S._revOrd&&S._revOrd.slice(0,S._revIdx).includes(i);
    if(revealing||S.over||S.phase==='mesa_final'||yaRevelo){
      const pts=S.hands[i].reduce((a,c)=>a+cv(c),0);
      if(S.hands[i].length){
        S.hands[i].forEach(c=>{
          const ce=mkFace(c,false);
          ce.style.outline=`1.5px solid ${PCOLOR[i]}88`;
          // X roja encima de cada sobrante
          const xMark=document.createElement('div');
          xMark.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;color:rgba(210,30,30,.82);font-weight:900;pointer-events:none;z-index:2;text-shadow:0 0 4px rgba(0,0,0,.5),-1px -1px 0 rgba(180,0,0,.5),1px 1px 0 rgba(180,0,0,.5)';
          xMark.textContent='✕';
          ce.style.position='relative';
          ce.appendChild(xMark);
          bc.appendChild(ce);
        });
      } else {
        const m=document.createElement('span');
        m.style.cssText=`font-size:9px;color:${PCOLOR[i]};font-family:Cinzel,serif`;
        m.textContent='¡Sin sobrantes!';bc.appendChild(m);
      }
      d.appendChild(bc);
      // puntos debajo del jugador
      const ptsDiv=document.createElement('div');
      ptsDiv.className='binfo';
      ptsDiv.style.cssText=`color:${pts>0?'#E24B4A':'#7be87b'};font-weight:700`;
      ptsDiv.textContent=pts===0?'✓ Sin sobrantes':'sobrantes: '+pts+' pts';
      d.appendChild(ptsDiv);
    } else {
      for(let j=0;j<Math.min(S.hands[i].length,3);j++)bc.appendChild(mkBack());
      const ct=document.createElement('span');
      ct.style.cssText='font-size:10px;color:rgba(201,168,76,.75);font-family:Cinzel,serif;align-self:center;margin-left:4px;font-weight:700';
      ct.textContent=`×${S.hands[i].length}`;bc.appendChild(ct);
      d.appendChild(bc);
      d.appendChild(Object.assign(document.createElement('div'),{className:'binfo',textContent:'en mano'}));
    }
    BR.appendChild(d);
  }
}

function drawCenter(){
  const inReveal=S.phase==='golpeado_reveal'||S.phase==='mesa_final';

  // MAZO — ocultar durante revelación
  const DK=$('DK');DK.innerHTML='';DK.parentElement.style.display=inReveal?'none':'';
  if(!inReveal){
    if(S.deck.length){for(let i=0;i<Math.min(3,S.deck.length);i++)DK.appendChild(mkBack());}
    else DK.innerHTML=`<div style="width:var(--cw);height:var(--ch);border-radius:4px;border:1.5px dashed rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center"><span style="font-size:7px;color:rgba(201,168,76,.35);font-family:Cinzel,serif">VACÍO</span></div>`;
  }

  // DESCARTE — ocultar durante revelación
  const DP=$('DP');DP.innerHTML='';DP.parentElement.style.display=inReveal?'none':'';
  if(!inReveal){
    if(S.disc.length){
      DP.style.border='none';
      const top=mkFace(S.disc[S.disc.length-1],false);
      top.style.cssText='position:absolute;top:0;left:0';
      DP.appendChild(top);
      if(S.disc.length>1){const ct=document.createElement('div');ct.className='dpct';ct.textContent=S.disc.length;DP.appendChild(ct);}
    } else {
      DP.style.border='1.5px dashed rgba(201,168,76,.3)';
      DP.innerHTML='<span class="dpmt">DESC<br>ARTE</span>';
    }
  }
  // COMBOS EN MESA — agrupados por jugador con color
  const TC=$('TC');TC.innerHTML='';
  // índice global de combo (a través de todos los jugadores) para _fitCandidates
  let globalComboIdx=0;
  S.shown.forEach((playerCombos,pi)=>{
    if(!playerCombos.length)return;
    const color=PCOLOR[pi];
    const pg=document.createElement('div');
    pg.style.cssText=`display:flex;flex-direction:column;gap:2px;align-items:flex-start;padding:2px 4px;border-radius:5px;background:rgba(0,0,0,.18);border:1px solid ${color}33`;
    const lbl=document.createElement('div');
    lbl.style.cssText=`font-family:Cinzel,serif;font-size:8px;color:${color};letter-spacing:.05em;white-space:nowrap;font-weight:700`;
    lbl.textContent=PNAME(pi);
    pg.appendChild(lbl);
    const row=document.createElement('div');
    row.style.cssText='display:flex;flex-wrap:wrap;gap:3px';
    playerCombos.forEach((combo,ci)=>{
      const myGlobalIdx=globalComboIdx++;
      const isFitTarget=S._fitCandidates&&S._fitCandidates.has(myGlobalIdx);
      const cset=document.createElement('div');
      // resaltar si es destino de encaje
      if(isFitTarget){
        cset.style.cssText=`display:flex;gap:1px;padding:3px;border-radius:6px;background:rgba(201,168,76,.12);border:2px solid var(--gold);box-shadow:0 0 12px rgba(201,168,76,.4);cursor:pointer;transition:transform .12s`;
        cset.title='Toca para encajar aquí';
        const doFit=()=>{
          const all=S.shown.flat();fitToCombo(all[myGlobalIdx]);
        };
        cset.addEventListener('click',doFit);
        cset.addEventListener('touchend',e=>{e.preventDefault();doFit();},{passive:false});
      } else {
        cset.style.cssText=`display:flex;gap:1px;padding:2px;border-radius:4px;background:rgba(0,0,0,.25);border:1px solid ${color}55;transition:opacity .15s`;
        // si hay modo encaje activo y este combo NO es candidato → atenuar
        if(S._fitCandidates&&S._fitCandidates.size>0)cset.style.opacity='0.4';
      }

      const ordered=sortCombo(combo);
      const inRevealPhase=S.phase==='golpeado_reveal'||S.phase==='mesa_final';
      ordered.forEach((c,cardIdx)=>{
        const ce=mkFace(c,false);
        // Joker draggable en combos propios (durante juego normal Y fases de revelación)
        if(c.jk&&pi===0&&!S.over){
          ce.style.cursor='grab';ce.draggable=true;
          ce.title='Arrastrá el Joker para cambiar su posición';
          ce.addEventListener('dragstart',ev=>{ev.dataTransfer.setData('jokerCombo',`${pi},${ci},${cardIdx}`);ev.dataTransfer.effectAllowed='move';});
          let jtx=0,jty=0,jGhost=null;
          ce.addEventListener('touchstart',ev=>{jtx=ev.touches[0].clientX;jty=ev.touches[0].clientY;},{passive:true});
          ce.addEventListener('touchmove',ev=>{
            const cx=ev.touches[0].clientX,cy=ev.touches[0].clientY;
            if(!jGhost&&(Math.abs(cx-jtx)>6||Math.abs(cy-jty)>6)){
              jGhost=document.createElement('div');jGhost.className=`card ${c.c}`;
              jGhost.innerHTML=`<div class="cn"><span class="cnn">${dispN(c)}</span><span class="cns">${c.s}</span></div><div class="cc">${cardInner(c)}</div><div class="cn b"><span class="cnn">${dispN(c)}</span><span class="cns">${c.s}</span></div>`;
              jGhost.style.cssText=`position:fixed;z-index:600;pointer-events:none;opacity:.85;transform:scale(1.15) rotate(5deg);transition:none;box-shadow:0 8px 24px rgba(0,0,0,.6);top:${cy-ch/2}px;left:${cx-cw/2}px`;
              document.body.appendChild(jGhost);ce.style.opacity='.3';
            }
            if(jGhost){
              const cw=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cw'));
              const ch=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ch'));
              jGhost.style.left=(cx-cw/2)+'px';jGhost.style.top=(cy-ch/2)+'px';
              document.querySelectorAll('.jdrop').forEach(x=>x.classList.remove('jdrop'));
              const tg=[...document.elementsFromPoint(cx,cy)].find(el=>el.dataset?.jdrop&&el!==ce);
              if(tg)tg.classList.add('jdrop');
            }
          },{passive:true});
          ce.addEventListener('touchend',ev=>{
            if(jGhost){jGhost.remove();jGhost=null;ce.style.opacity='';}
            const cx=ev.changedTouches[0].clientX,cy=ev.changedTouches[0].clientY;
            document.querySelectorAll('.jdrop').forEach(x=>x.classList.remove('jdrop'));
            const tg=[...document.elementsFromPoint(cx,cy)].find(el=>el.dataset?.jdrop&&el!==ce);
            if(tg){
              tryJokerMove(combo,cardIdx,parseInt(tg.dataset.jdrop));
            }
          },{passive:true});
        }
        // drop zone para Joker drag (combos propios)
        if(pi===0&&!S.over){
          ce.dataset.jdrop=cardIdx;
          ce.addEventListener('dragover',ev=>{ev.preventDefault();ce.style.outline='2px solid '+color;});
          ce.addEventListener('dragleave',()=>ce.style.outline='');
          ce.addEventListener('drop',ev=>{
            ev.preventDefault();ce.style.outline='';
            const data=ev.dataTransfer.getData('jokerCombo');if(!data)return;
            const[dpi,dci,fromIdx]=data.split(',').map(Number);
            if(dpi!==pi||dci!==ci)return;
            tryJokerMove(combo,fromIdx,cardIdx);
          });
        }
        cset.appendChild(ce);
      });
      row.appendChild(cset);
    });
    pg.appendChild(row);
    TC.appendChild(pg);
  });
  drawMsg();
}

function drawMsg(){
  const el=$('MSG');
  // en revelación: mostrar tiempo restante para todos si hay timer
  if(S.phase==='golpeado_reveal'&&S._revPid>0){
    // otro jugador está mostrando — no hay timer local, solo msg
    el.textContent=S.msg;
    el.className='';
    return;
  }
  el.textContent=S.msg;
  // turno del jugador → parpadeo dorado
  const esMiTurno=(S.cur===0&&!S.over&&(S.phase==='play'||S.phase==='drew'||S.phase==='took_discard'||S.phase==='first_discard'));
  el.className=esMiTurno?'tu-turno':'';
}

function drawHand(){
  const PH=$('PH');PH.innerHTML='';
  const isReveal=S.phase==='golpeado_reveal'&&S._revPid===0;
  const isMesaFinal=S.phase==='mesa_final';
  // mostrar X en sobrantes cuando ya mostré mis combos
  // yaMostré = mi slot (0) aparece en _revOrd ANTES de _revIdx actual
  const yaMostre=S._revOrd&&S._revOrd.slice(0,S._revIdx).includes(0);
  const showX=(S.phase==='golpeado_reveal'&&yaMostre)||isMesaFinal;
  S.hands[0].forEach(c=>{
    if(isReveal){
      const isSel=S._revSel&&S._revSel.has(c.id);
      const ce=mkFace(c,false);
      ce.style.outline=isSel?`2.5px solid ${PCOLOR[0]}`:`1.5px solid ${PCOLOR[0]}55`;
      ce.style.transform=isSel?'translateY(-10px)':'none';
      ce.style.transition='transform .12s,outline .12s';
      ce.style.cursor='pointer';
      let touched=false;
      ce.addEventListener('touchend',e=>{
        e.preventDefault();touched=true;
        revealToggle(c.id);
        setTimeout(()=>touched=false,400);
      },{passive:false});
      ce.addEventListener('click',()=>{if(!touched)revealToggle(c.id);});
      PH.appendChild(ce);
    } else if(showX){
      const ce=mkFace(c,false);
      ce.style.outline=`1.5px solid ${PCOLOR[0]}66`;
      ce.style.position='relative';
      const xMark=document.createElement('div');
      xMark.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;color:rgba(210,30,30,.85);font-weight:900;pointer-events:none;z-index:2;text-shadow:0 0 4px rgba(0,0,0,.5),-1px -1px 0 rgba(180,0,0,.5),1px 1px 0 rgba(180,0,0,.5)';
      xMark.textContent='✕';
      ce.appendChild(xMark);
      PH.appendChild(ce);
    } else {
      PH.appendChild(mkFace(c,true));
    }
  });
  // mostrar puntos propios debajo de la mano durante revelación y mesa final
  const handPts=$('HAND_PTS');
  if(handPts){
    const showPts=S.phase==='golpeado_reveal'||S.phase==='mesa_final';
    if(showPts){
      const pts=S.hands[0].reduce((a,c)=>a+cv(c),0);
      handPts.textContent=pts===0?'✓ Sin sobrantes':'Sobrantes: '+pts+' pts';
      handPts.style.color=pts===0?'#7be87b':'#E24B4A';
    } else {
      handPts.textContent='';
    }
  }
}

  let turnoNombre, turnoColor, fontSize;

  if(S.phase==='golpeado_reveal'){
    if(S._revPid===0){
      turnoNombre='MOSTRANDO';turnoColor='var(--gold)';fontSize='10px';
    } else if(S._revPid>0){
      turnoNombre=PNAME(S._revPid);turnoColor=PCOLOR[S._revPid]||'rgba(201,168,76,.5)';fontSize='10px';
    } else {
      turnoNombre='GOLPEADO';turnoColor='#E24B4A';fontSize='10px';
    }
  } else if(S.phase==='mesa_final'){
    turnoNombre='MESA';turnoColor='rgba(201,168,76,.5)';fontSize='10px';
  } else {
    const esMiTurno=S.cur===0&&!S.over;

    '<div style="display:flex;flex-direction:column;align-items:center"><span class="hv">'+S.deck.length+'</span><span>mazo</span></div>'+
    '<div style="display:flex;flex-direction:column;align-items:center"><span class="hv">'+S.shown[0].length+'</span><span>combos</span></div>'+
    chipHtml+
    '<div style="display:flex;flex-direction:column;align-items:center"><span class="hv" style="color:'+turnoColor+';font-size:'+fontSize+'">'+turnoNombre+'</span><span>turno</span></div>';
  if(BET>0){

  }
}

function drawActs(){
  const ACT=$('ACT');ACT.innerHTML='';
  const color=PCOLOR[0];

  // ── FASE REVISIÓN MESA FINAL ──
  if(S.phase==='mesa_final'){
    let summary='';let penHtml='';
    try{
      const scores=S.hands.map(h=>h.reduce((a,c)=>a+cv(c),0));
      const adj=scores.map((s,i)=>s+(usedBothWilds(i)?60:0));
      summary=S.hands.map((h,i)=>'<span style="color:'+PCOLOR[i]+';font-weight:700">'+PNAME(i)+': '+adj[i]+'pts</span>').join(' &nbsp;·&nbsp; ');
      const pens=detectPenalties();
      if(pens.length){penHtml=pens.map(p=>'<div style="background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.35);border-radius:6px;padding:5px 10px;font-size:9px;text-align:center;width:100%">⚠️ <span style="color:'+p.color+';font-weight:700">'+p.name+'</span> <span style="color:rgba(232,220,200,.8)"> paga el <strong style="color:#E24B4A">doble</strong> — '+p.reason+'</span></div>').join('');}
    }catch(e){console.log('drawActs error:',e);}
    ACT.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:100%">'+(summary?'<div style="font-size:9px;color:rgba(232,220,200,.7);text-align:center">'+summary+'</div>':'')+penHtml+'<button class="btn pri" style="width:100%;font-size:11px;padding:8px" onclick="verResultados()">Ver resultados finales →</button></div>';
    const btn=ACT.querySelector('button');
    if(btn)btn.addEventListener('touchend',e=>{e.preventDefault();verResultados();},{passive:false});
    return;
  }

  // ── FASE REVELACIÓN HUMANO ──
  if(S.phase==='golpeado_reveal'&&S._revPid===0){
    const pts=S.hands[0].reduce((a,c)=>a+cv(c),0);
    let h='';
    const nextName=S._revIdx<S._revOrd.length-1?PNAME(S._revOrd[S._revIdx+1]):'';
    const _hh=S.hands[0];
    const hayCombo=(()=>{for(let i=0;i<_hh.length;i++)for(let j=i+1;j<_hh.length;j++)for(let k=j+1;k<_hh.length;k++)if(validCombo([_hh[i],_hh[j],_hh[k]]))return true;return false;})();
    // usar TODOS los combos en mesa (propios y de otros jugadores)
    const todosLosCombos=S.shown.flat();
    const hayEncaje=_hh.some(card=>todosLosCombos.some(combo=>{
      if(!combo||!combo.cards||!combo.cards.length)return false;
      return canFit(combo.cards,card);
    }));
    const hayMas=hayCombo||hayEncaje;

    if(_hh.length){
      // Bajar y Encajar — si ya no hay opciones se atenúan, listo toma protagonismo
      const dimmed=!hayMas;
      const bajarStyle=`flex:1;padding:8px 4px;border-radius:7px;font-family:Cinzel,serif;font-size:10px;font-weight:700;cursor:pointer;touch-action:manipulation;text-align:center;border:2px solid ${dimmed?`rgba(201,168,76,.25)`:color};background:${dimmed?'transparent':color};color:${dimmed?`rgba(201,168,76,.3)`:`#1a1230`};transition:all .2s`;
      const encajarStyle=`flex:1;padding:8px 4px;border-radius:7px;font-family:Cinzel,serif;font-size:10px;font-weight:700;cursor:pointer;touch-action:manipulation;text-align:center;border:1.5px solid ${dimmed?'rgba(232,220,200,.12)':'rgba(232,220,200,.55)'};background:transparent;color:${dimmed?'rgba(232,220,200,.2)':'rgba(232,220,200,.8)'};transition:all .2s`;
      h+=`<div style="display:flex;gap:6px;width:100%">`;
      h+=`<button onclick="revealBajar()" style="${bajarStyle}">⬇ Bajar combo</button>`;
      h+=`<button onclick="revealEncajar()" style="${encajarStyle}">🔗 Encajar</button>`;
      h+=`</div>`;
    }

    // Listo — su tamaño y estilo depende de si hay más opciones
    let listoLabel,listoStyle;
    const esUltimo=S._revIdx>=S._revOrd.length-1; // soy el último en revelar
    if(!_hh.length){
      // sin sobrantes
      listoLabel=esUltimo?'✅ ¡Sin sobrantes! — Confirmar Listo':'✅ ¡Sin sobrantes! — Listo';
      listoStyle=`width:100%;padding:8px;border-radius:7px;border:none;background:${color};color:#1a1230;font-family:Cinzel,serif;font-size:10px;font-weight:700;cursor:pointer;touch-action:manipulation;box-shadow:0 3px 10px rgba(201,168,76,.45)`;
    } else if(hayMas){
      // todavía hay opciones: listo es discreto
      listoLabel='⚠️ Confirmá Listo — '+pts+' pts sobrantes';
      listoStyle=`width:100%;padding:5px;border-radius:6px;border:1px solid rgba(232,220,200,.2);background:transparent;color:rgba(232,220,200,.35);font-family:Cinzel,serif;font-size:9px;cursor:pointer;touch-action:manipulation`;
    } else {
      // sobrantes sin más opciones
      listoLabel='✓ Listo — '+pts+' pts sobrantes';
      listoStyle=`width:100%;padding:8px;border-radius:7px;border:none;background:${color};color:#1a1230;font-family:Cinzel,serif;font-size:10px;font-weight:700;cursor:pointer;touch-action:manipulation;box-shadow:0 3px 10px rgba(201,168,76,.4)`;
    }
    // mostrar contador de tiempo si está corriendo
    const seg=getRevTimerSec();
    if(seg>0){
      const pct=seg/REV_TIMEOUT*100;
      const timerColor=seg>30?'#7be87b':seg>10?'#E8A84C':'#E24B4A';
      h+=`<div style="width:100%;max-width:300px;margin-top:2px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:9px;color:rgba(232,220,200,.5);font-family:Cinzel,serif">⏱ Tiempo restante</span>
          <span style="font-size:11px;font-weight:700;color:${timerColor};font-family:Cinzel,serif">${seg}s</span>
        </div>
        <div style="width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${timerColor};border-radius:2px;transition:width .9s linear"></div>
        </div>
      </div>`;
    }
    h+=`<button style="${listoStyle}" onclick="revealListo()">${listoLabel}</button>`;
    ACT.innerHTML=h;
    return;
  }

  if(S.over)return;
  if(S.cur!==0)return; // en multi S.cur===0 significa mi turno (ya rotado)
  const cs=selCards();let h='';
  switch(S.phase){
    case'first_discard':
      h=cs.length===1?`<button class="btn pri" onclick="actDiscard()">Descartar y comenzar</button>`:`<span class="hint">Selecciona 1 carta para descartar</span>`;
      break;
    case'play':
      h=`<button class="btn dng" onclick="actGolpe()">¡GOLPEADO!</button>`;
      h+=`<button class="btn" onclick="actTakeDisc()" ${!S.disc.length?'disabled':''}>Tomar descarte</button>`;
      h+=`<button class="btn" onclick="actDraw()">Del mazo</button>`;
      break;
    case'drew':
      if(!S.comboThisTurn&&cs.length>=3)h+=`<button class="btn" onclick="actShowCombo()">Mostrar combo</button>`;
      if(cs.length===1)h+=`<button class="btn pri" onclick="actDiscard()">Descartar</button>`;
      if(!cs.length)h+=`<span class="hint">${S.comboThisTurn?'Selecciona 1 para descartar':'Selecciona 1 para descartar ó 3+ para combo'}</span>`;
      if(cs.length>1&&cs.length<3)h+=`<span class="hint">Selecciona 1 para descartar ó 3+ para combo</span>`;
      break;
    case'took_discard':
      h=cs.length>=3?`<button class="btn pri" onclick="actShowCombo()">Mostrar combinación</button>`:`<span class="hint">Selecciona mín. 3 cartas (incluye la tomada)</span>`;
      break;
    case'showed_combo':
      h=cs.length===1?`<button class="btn pri" onclick="actDiscard()">Descartar</button>`:`<span class="hint">Selecciona 1 carta para descartar</span>`;
      break;
    case'golpeado_reveal':
      h=`<span class="hint">Esperando...</span>`;break;
  }
  ACT.innerHTML=h;
}

// FINAL OVERLAY
function showFinalOv(){
  rmEl('OV');
  const ov=mkEl('div','ov','OV');

function getSalaParam(){
  try{
    // intentar ?sala= primero
    const p=new URLSearchParams(window.location.search);
    if(p.get('sala'))return p.get('sala').toUpperCase().trim();
    // fallback: #sala=ABC123
    const h=window.location.hash;
    const m=h.match(/sala=([A-Z0-9]+)/i);
    if(m)return m[1].toUpperCase().trim();
    // fallback extra: buscar en href completo
    const m2=window.location.href.match(/[?&#]sala=([A-Z0-9]+)/i);
    return m2?m2[1].toUpperCase().trim():'';
  }catch(e){return '';}
}

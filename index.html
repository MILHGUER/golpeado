// ── API SUPABASE ──
async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{
    'apikey':SB_KEY,
    'Authorization':'Bearer '+SB_KEY,
    'Content-Type':'application/json',
    'Prefer':'return=representation',
    'X-Client-Info':'golpeado/1.0'
  }};
  if(body)opts.body=JSON.stringify(body);
  try{
    const r=await fetch(SB_URL+path,opts);
    if(!r.ok){
      const t=await r.text();
      // si es 404 en tabla, dar mensaje claro
      if(r.status===404||t.includes('relation')||t.includes('does not exist')){
        throw new Error('Tabla "salas" no existe. Ejecutá el SQL en Supabase → SQL Editor.');
      }
      throw new Error(`HTTP ${r.status}: ${t.slice(0,100)}`);
    }
    const txt=await r.text();
    return txt?JSON.parse(txt):null;
  }catch(e){
    if(e.message==='Failed to fetch'){
      throw new Error('No se pudo conectar a Supabase. Verificá tu conexión o el URL del proyecto.');
    }
    throw e;
  }
}

async function sbGet(salaId){
  const rows=await sbFetch(`/rest/v1/salas?id=eq.${salaId}&select=*`);
  return rows&&rows[0]||null;
}
async function sbSet(salaId,estado){
  const rows=await sbFetch(`/rest/v1/salas?id=eq.${salaId}`,'PATCH',{estado});
  if(!rows||!rows.length){
    await sbFetch('/rest/v1/salas','POST',{id:salaId,estado});
  }
}
async function sbCreate(salaId,estado){
  try{await sbFetch('/rest/v1/salas','POST',{id:salaId,estado});}
  catch(e){await sbFetch(`/rest/v1/salas?id=eq.${salaId}`,'PATCH',{estado});}
}

// ── CREAR SALA ──
async function crearSala(){
  showLobbyLoading('Creando sala...');
  const estado={
    fase:'lobby',
    host:MP.myId,
    apuesta:0,
    jugadores:[{id:MP.myId,nombre:MP.myName,slot:0,listo:false,conectado:true}],
    gameState:null,
    chat:[],
    ts:Date.now()
  };
  try{
    await sbCreate(MP.salaId,estado);
    MP.mySlot=0;
    suscribirSala(()=>showLobbyHost(estado));
  }catch(e){
    showError('Error creando sala: '+e.message);
  }
}

// ── UNIRSE A SALA ──
async function unirseASala(){
  showLobbyLoading('Buscando sala...');
  try{
    const row=await sbGet(MP.salaId);
    if(!row){showError('Sala no encontrada. Verificá el código.');return;}
    const estado=row.estado;

    // ── RECONEXIÓN: verificar si el jugador ya estaba en la sala ──
    const jugExistente=estado.jugadores&&estado.jugadores.find(
      j=>j.id===MP.myId||(j.nombre&&MP.myName&&j.nombre.toLowerCase()===MP.myName.toLowerCase())
    );
    if(jugExistente){
      // reconectar: recuperar slot y continuar
      MP.mySlot=jugExistente.slot;
      MP.isHost=jugExistente.id===(estado.host||estado.jugadores[0]?.id);
      jugExistente.id=MP.myId; // actualizar ID por si cambió
      jugExistente.conectado=true;
      estado.ts=Date.now();
      await sbSet(MP.salaId,estado);
      if(estado.fase==='lobby'){
        suscribirSala(()=>buildLobbyUI(estado,MP.isHost));
      } else {
        // partida en curso: reconectar directo al juego
        suscribirSala(()=>handleEstadoRemoto(estado));
      }
      return;
    }

    // ── NUEVO JUGADOR ──
    if(estado.fase!=='lobby'){showError('La partida ya está en curso. Si eras parte de esta sala, ingresá con el mismo nombre que usaste.');return;}
    if(estado.jugadores.length>=3){showError('La sala está llena (máx. 3 jugadores).');return;}
    // agregar jugador
    const slot=estado.jugadores.length;
    MP.mySlot=slot;
    estado.jugadores.push({id:MP.myId,nombre:MP.myName,slot,listo:false,conectado:true});
    estado.ts=Date.now();
    await sbSet(MP.salaId,estado);
    suscribirSala(()=>showLobbyJugador(estado));
  }catch(e){
    showError('Error uniéndose: '+e.message);
  }
}

// ── SUSCRIPCIÓN REALTIME ──
function suscribirSala(onReady){
  if(MP._pollInterval){clearInterval(MP._pollInterval);MP._pollInterval=null;}
  let lastTs=0;
  let ready=false; // no procesar hasta que onReady haya corrido
  MP._pollInterval=setInterval(async()=>{
    if(!ready)return;
    if($('NOM_OV')||$('ERR_OV'))return;
    try{
      const row=await sbGet(MP.salaId);
      if(!row)return;
      const estado=row.estado;
      if(estado.ts!==lastTs){
        lastTs=estado.ts;
        handleEstadoRemoto(estado);
      }
    }catch(e){}
  },1000);
  if(onReady){onReady();ready=true;}
}

function stopPoll(){if(MP._pollInterval){clearInterval(MP._pollInterval);MP._pollInterval=null;}}

// ── MANEJAR ESTADO REMOTO ──
function handleEstadoRemoto(estado){
  // ── LOBBY ──
  if(estado.fase==='lobby'){
    const ov=$('LOBBY_OV');
    if(ov){
      actualizarLobbyUI(estado);
    } else if(MP.myId){
      // limpiar estado del juego anterior al volver al lobby
      rmEl('OV');rmEl('SHUF');rmEl('PNLT_OV');rmEl('CONFIRM_LISTO');
      const np=estado.jugadores?estado.jugadores.length:S.np||2;
      Object.assign(S,{deck:[],disc:[],hands:Array.from({length:np},()=>[]),shown:Array.from({length:np},()=>[]),sel:[],cur:0,phase:'lobby',over:false,golpBy:-1,msg:'',comboThisTurn:false,dragId:0,_revOrd:null,_revIdx:0,_revPid:-1,_revSel:new Set(),_fitTarget:null,_fitCandidates:null});
      redraw(); // limpiar tablero
      buildLobbyUI(estado,MP.isHost);
    }
    return;
  }

  // ── BARAJANDO (host anima, invitados ven animación) ──
  if(estado.fase==='barajando'){
    if(!MP.isHost){
      if(!$('SHUF')){
        rmEl('LOBBY_OV');
        MP.mode='multi';S.np=estado.np||2;
        MP._jugadores=estado.jugadores||[];MP._hostId=estado.host||'';
        const nr={};(estado.jugadores||[]).forEach(j=>{const rs=(j.slot-MP.mySlot+S.np)%S.np;nr[rs]=j.nombre;});
        nr[0]=MP.myName||'Tú';MP._nombres=nr;
        showShufOvGuest();
      }
    }
    return;
  }

  // ── CORTANDO (host cortó, invitados ven animación de corte) ──
  if(estado.fase==='cortando'){
    if(!MP.isHost){
      const shuf=$('SHUF');
      if(shuf){
        // animar el corte visual
        const cards=shuf.querySelectorAll('.sc');
        const msg=shuf.querySelector('.smsg');
        const sub=shuf.querySelector('.ssub');
        if(msg)msg.textContent='¡Cortando el mazo!';
        if(sub)sub.textContent='Repartiendo en un momento...';
        if(cards[0]){cards[0].style.transition='transform .4s';cards[0].style.transform='translateY(-28px)';}
        if(cards[1]){cards[1].style.transition='transform .4s';cards[1].style.transform='translateY(-16px)';}
        sndCut();
      }
    }
    return;
  }

  // ── DEALING (TODOS animan carta por carta) ──
  if(estado.fase==='dealing'){
    // solo procesar una vez (evitar re-animar si ya está en dealing o first_discard)
    if(S.phase==='dealing'||S.phase==='first_discard'||S.phase==='play')return;
    if(!estado.dealSeq||!estado.dealSeq.length)return;

    // verificar que el jugador esté en la sala
    const soyJugador=!MP.myId||(estado.jugadores&&estado.jugadores.some(j=>j.id===MP.myId));
    if(!soyJugador)return;

    rmEl('LOBBY_OV');rmEl('SHUF');
    MP.mode='multi';
    S.np=estado.np||2;
    MP._jugadores=estado.jugadores||[];MP._hostId=estado.host||'';
    const nr={};(estado.jugadores||[]).forEach(j=>{const rs=(j.slot-MP.mySlot+S.np)%S.np;nr[rs]=j.nombre;});
    nr[0]=MP.myName||'Tú';MP._nombres=nr;
    BET=estado.apuesta||0;
    S.deck=estado.deck||[];S.disc=[];
    S.hands=Array.from({length:S.np},()=>[]);
    S.shown=Array.from({length:S.np},()=>[]);
    S.phase='dealing';
    // rotar seq para que mi slot quede en índice 0
    const seq=estado.dealSeq.map(({p,card})=>({p:(p-MP.mySlot+S.np)%S.np,card}));
    if(!MP.isHost){
      // invitado: reproducir animación
      animateDeal(seq,()=>{
        S.phase='first_discard';
        S.msg='Esperando al primer jugador...';
        redraw();
      });
    }
    return;
  }

  // para fases de juego verificar que el jugador esté registrado
  const soyJugador=estado.jugadores&&estado.jugadores.some(j=>j.id===MP.myId);
  if(!soyJugador)return;

  // ── GOLPEADO REVEAL ──
  if(estado.fase==='golpeado_reveal'){
    rmEl('LOBBY_OV');rmEl('SHUF');
    // si el phase real publicado ya es mesa_final, saltar al bloque correcto
    if(estado.phase==='mesa_final'){
      aplicarEstadoRemoto(estado);
      return; // aplicarEstadoRemoto ya maneja mesa_final internamente
    }
    const prevPhase=S.phase;
    const prevRevIdx=S._revIdx;
    const prevRevPid=S._revPid;
    aplicarEstadoRemoto(estado);

    // Si después de aplicar el estado ya estamos en mesa_final, ya lo maneja aplicarEstadoRemoto
    if(S.phase==='mesa_final') return;

    if(prevPhase!=='golpeado_reveal'&&prevPhase!=='mesa_final'){
      const savedPhase=S.phase;
      S.phase='shuffle';
      redraw();
      const gp=S.golpBy;
      const msg=gp===0?'¡Declaraste GOLPEADO!':'¡'+PNAME(gp)+' declaró GOLPEADO!';
      showGolpeAnimation(msg,()=>{
        S.phase=savedPhase;
        setTimeout(()=>{
          if(S._revPid===0&&S.phase==='golpeado_reveal'){
            S.msg='Tu turno de mostrar — seleccioná tus cartas para bajar combos o encajar.';
          }
          redraw();
        },600);
      });
    } else {
      redraw();
    }
    return;
  }

  // ── JUEGO NORMAL ──
  if(estado.fase==='jugando'){
    rmEl('LOBBY_OV');rmEl('SHUF');
    aplicarEstadoRemoto(estado);
    // si el phase real es mesa_final (timing), mostrarlo correctamente
    if(S.phase==='mesa_final'){
      redraw();
      const penalties=detectPenalties();
      if(penalties.length)setTimeout(()=>showPenaltyAnimation(penalties,()=>redraw()),600);
    }
  }

  // ── MESA FINAL — todos ven "Ver resultados" ──
  if(estado.fase==='mesa_final'){
    rmEl('LOBBY_OV');rmEl('SHUF');
    aplicarEstadoRemoto(estado);
    if(S.phase==='mesa_final'){
      redraw(); // muestra botón Ver resultados inmediatamente
      const penalties=detectPenalties();
      if(penalties.length){
        setTimeout(()=>showPenaltyAnimation(penalties,()=>{redraw();}),600);
      }
    }
  }

  // ── END ──
  if(estado.fase==='end'){
    rmEl('LOBBY_OV');rmEl('SHUF');
    aplicarEstadoRemoto(estado);
  }
}

// ── INICIAR PARTIDA MULTI ──
async function iniciarPartidaMulti(estadoLobby){
  UID=0;
  const np=estadoLobby.jugadores.length;
  BET=estadoLobby.apuesta||0;
  MP._jugadores=estadoLobby.jugadores;
  MP._hostId=estadoLobby.host;

  // construir nombres
  const nombresReales={};
  estadoLobby.jugadores.forEach(j=>{
    const relSlot=(j.slot-MP.mySlot+np)%np;
    nombresReales[relSlot]=j.nombre;
  });
  nombresReales[0]=MP.myName||nombresReales[0]||'Tú';
  MP._nombres=nombresReales;

  // publicar estado "barajando" para que todos vean la animación
  const estadoBarajando={
    fase:'barajando',
    np,jugadores:estadoLobby.jugadores,apuesta:BET,host:estadoLobby.host,
    deck:[],disc:[],hands:Array.from({length:np},()=>[]),
    shown:Array.from({length:np},()=>[]),
    sel:[],cur:0,phase:'shuffle',over:false,golpBy:-1,
    msg:'Barajando las cartas...',comboThisTurn:false,
    _revOrd:null,_revIdx:0,_revPid:-1,_revSel:[],
    _fitTarget:null,_fitCandidates:null,ts:Date.now()
  };
  try{await sbSet(MP.salaId,estadoBarajando);}catch(e){showError('Error: '+e.message);return;}

  // mostrar animación de barajado localmente
  rmEl('LOBBY_OV');
  MP.mode='multi';
  S.np=np;S.phase='shuffle';
  showShufOvMulti(()=>{
    // después del corte: generar mazo y publicar dealSeq para que TODOS animen
    UID=0;
    const rawDeck=shuf(makeDeck());
    const counts=Array.from({length:np},(_,i)=>i===0?10:9);
    const given=Array.from({length:np},()=>0);
    const seq=[];let pool=[...rawDeck],p=0;
    const total=counts.reduce((a,b)=>a+b,0);
    while(seq.length<total){
      if(given[p]<counts[p]){const card=pool.shift();seq.push({p,card});given[p]++;}
      p=(p+1)%np;
    }
    const deck=pool; // resto es el mazo

    // publicar fase='dealing' con la secuencia completa
    const dealState={
      fase:'dealing',np,jugadores:estadoLobby.jugadores,apuesta:BET,
      host:estadoLobby.host,deck,disc:[],
      hands:Array.from({length:np},()=>[]),
      shown:Array.from({length:np},()=>[]),
      sel:[],cur:0,phase:'dealing',dealSeq:seq,
      over:false,golpBy:-1,msg:'Repartiendo...',comboThisTurn:false,
      _revOrd:null,_revIdx:0,_revPid:-1,_revSel:[],
      _fitTarget:null,_fitCandidates:null,ts:Date.now()
    };

    sbSet(MP.salaId,dealState).then(()=>{
      // host anima localmente
      S.np=np;S.deck=deck;S.disc=[];BET=BET;
      S.hands=Array.from({length:np},()=>[]);
      S.shown=Array.from({length:np},()=>[]);
      S.phase='dealing';
      animateDeal(seq,()=>{
        S.phase='first_discard';
        S.msg='Primer turno: seleccioná 1 carta para descartar y comenzar.';
        S.cur=0;S.over=false;S.golpBy=-1;S.sel=[];S.comboThisTurn=false;
        S._revOrd=null;S._revIdx=0;S._revPid=-1;S._revSel=new Set();
        S._fitTarget=null;S._fitCandidates=null;
        redraw();mpPublicarEstado();
      });
    }).catch(e=>showError('Error al repartir: '+e.message));
  });
}

// ── APLICAR ESTADO REMOTO AL JUEGO LOCAL ──
function aplicarEstadoRemoto(estado){
  rmEl('LOBBY_OV');
  MP.mode='multi';
  BANK=null; // forzar recarga lazy desde localStorage

  // guardar info de jugadores para nombres
  MP._jugadores=estado.jugadores||[];
  MP._hostId=estado.host||'';

  // construir mapa de nombres por slot REAL (antes de rotar)
  // Mi slot es MP.mySlot, el resto son los otros jugadores en orden
  const nombresReales={};
  if(estado.jugadores){
    estado.jugadores.forEach(j=>{
      // calcular posición relativa a mi slot (yo=0, siguiente=1, etc)
      const relSlot=(j.slot-MP.mySlot+estado.np)%estado.np;
      nombresReales[relSlot]=j.nombre;
    });
  }
  nombresReales[0]=MP.myName||nombresReales[0]||'Tú';
  MP._nombres=nombresReales;

  // mapear estado remoto a S local
  S.np=estado.np||2;
  S.deck=estado.deck||[];
  S.disc=estado.disc||[];

  // rotar manos/shown para que mi mano quede en índice 0
  const rot=(arr,n,np)=>{
    const a=arr.slice(0,np);
    for(let i=0;i<n;i++)a.push(a.shift());
    return a;
  };
  const rawHands=estado.hands||Array.from({length:S.np},()=>[]);
  const rawShown=estado.shown||Array.from({length:S.np},()=>[]);
  S.hands=rot(rawHands,MP.mySlot,S.np);
  S.shown=rot(rawShown,MP.mySlot,S.np);

  // rotar cur y golpBy
  S.cur=(((estado.cur||0)-MP.mySlot)+S.np)%S.np;
  S.golpBy=estado.golpBy>=0?(((estado.golpBy)-MP.mySlot+S.np)%S.np):-1;

  S.sel=estado.sel||[];
  S.phase=estado.phase||'play';
  S.over=estado.over||false;
  // regenerar mensaje según perspectiva local (no copiar el del otro jugador)
  if(S.phase==='play'||S.phase==='first_discard'){
    if(S.cur===0){
      S.msg='Tu turno: ¡GOLPEADO! · tomar descarte · tomar del mazo.';
    } else {
      S.msg='Turno de '+PNAME(S.cur)+'...';
    }
  } else if(S.phase==='golpeado_reveal'){
    if(S._revPid===0) S.msg='Tu turno de mostrar — seleccioná tus cartas para bajar combos o encajar.';
    else if(S._revPid>0) S.msg=PNAME(S._revPid)+' está mostrando su juego...';
    else S.msg=estado.msg||'';
  } else if(S.phase==='mesa_final'){
    S.msg='¡Todos mostraron su juego! Presioná Ver resultados.';
  } else {
    S.msg=estado.msg||'';
  }
  S.comboThisTurn=estado.comboThisTurn||false;
  S._revOrd=estado._revOrd?estado._revOrd.map(pid=>(pid-MP.mySlot+S.np)%S.np):null;
  S._revIdx=estado._revIdx||0;
  S._revPid=estado._revPid!=null?(((estado._revPid)-MP.mySlot+S.np)%S.np):-1;
  S._revSel=new Set(estado._revSel||[]);
  S._fitTarget=estado._fitTarget||null;
  S._fitCandidates=estado._fitCandidates?new Set(estado._fitCandidates):null;
  BET=estado.apuesta||0;

  redraw();

  if(S.phase==='end'&&!$('OV')){
    setTimeout(showFinalOv,400);
  }

  // en multi: si llegamos a mesa_final via cualquier ruta, forzar redraw con botón
  if(S.phase==='mesa_final'){
    redraw();
    const penalties=detectPenalties();
    if(penalties.length&&!$('PNLT_OV')){
      setTimeout(()=>showPenaltyAnimation(penalties,()=>redraw()),600);
    }
    return;
  }

  // en multi: manejar timer de revelación según turno
  if(MP.mode==='multi'&&S.phase==='golpeado_reveal'){
    const esMiTurno=S._revPid===0;
    if(esMiTurno&&!S.over){
      S.msg='Tu turno de mostrar — seleccioná tus cartas para bajar combos o encajar.';
      redraw();
      // arrancar timer solo si no está ya corriendo (evitar reinicio en cada poll)
      if(getRevTimerSec()===0){
        startRevTimer();
      }
    } else {
      // no es mi turno — cancelar cualquier timer que esté corriendo
      clearRevTimer();
    }
  }
  // limpiar timer si ya no estamos en revelación
  if(S.phase!=='golpeado_reveal'){
    clearRevTimer();
  }
}

// ── PUBLICAR ESTADO COMPLETO DEL JUEGO ──
async function mpPublicarEstado(){
  if(MP.mode!=='multi')return;
  try{
    // des-rotar manos al orden real antes de guardar
    const deRot=(arr,n,np)=>{
      const a=arr.slice(0,np);
      // rotar en sentido contrario
      for(let i=0;i<np-n;i++)a.push(a.shift());
      return a;
    };
    const np=S.np;
    const realHands=MP.mySlot>0?deRot(S.hands,MP.mySlot,np):S.hands.slice(0,np);
    const realShown=MP.mySlot>0?deRot(S.shown,MP.mySlot,np):S.shown.slice(0,np);
    // des-rotar cur y golpBy
    const realCur=(S.cur+MP.mySlot)%np;
    const realGolpBy=S.golpBy>=0?(S.golpBy+MP.mySlot)%np:-1;
    const realRevPid=S._revPid>=0?(S._revPid+MP.mySlot)%np:-1;

    const estado={
      // usar fase correcta para que handleEstadoRemoto lo enrute bien
      fase:S.phase==='mesa_final'?'mesa_final':(S.phase==='golpeado_reveal'?'golpeado_reveal':'jugando'),
      np,
      jugadores:MP._jugadores||[],
      apuesta:BET,
      host:MP._hostId||'',
      deck:S.deck,
      disc:S.disc,
      hands:realHands,
      shown:realShown,
      sel:S.sel,
      cur:realCur,
      phase:S.phase,
      over:S.over,
      golpBy:realGolpBy,
      msg:S.msg,
      comboThisTurn:S.comboThisTurn,
      _revOrd:S._revOrd?S._revOrd.map(pid=>(pid+MP.mySlot)%np):null,
      _revIdx:S._revIdx,
      _revPid:realRevPid,
      _revSel:[...S._revSel],
      _fitTarget:S._fitTarget,
      _fitCandidates:S._fitCandidates?[...S._fitCandidates]:null,
      ts:Date.now()
    };
    await sbSet(MP.salaId,estado);
  }catch(e){console.log('Error publicando estado:',e);}
}

// Publicar con fase personalizada (ej. para GOLPEADO)
async function mpPublicarEstadoConFase(faseOverride){
  if(MP.mode!=='multi')return;
  try{
    const deRot=(arr,n,np)=>{const a=arr.slice(0,np);for(let i=0;i<np-n;i++)a.push(a.shift());return a;};
    const np=S.np;
    const realHands=MP.mySlot>0?deRot(S.hands,MP.mySlot,np):S.hands.slice(0,np);
    const realShown=MP.mySlot>0?deRot(S.shown,MP.mySlot,np):S.shown.slice(0,np);
    const realCur=(S.cur+MP.mySlot)%np;
    const realGolpBy=S.golpBy>=0?(S.golpBy+MP.mySlot)%np:-1;
    const realRevPid=S._revPid>=0?(S._revPid+MP.mySlot)%np:-1;
    const estado={
      fase:faseOverride||'jugando',np,jugadores:MP._jugadores||[],apuesta:BET,
      host:MP._hostId||'',deck:S.deck,disc:S.disc,
      hands:realHands,shown:realShown,sel:S.sel,cur:realCur,
      phase:S.phase,over:S.over,golpBy:realGolpBy,msg:S.msg,
      comboThisTurn:S.comboThisTurn,_revOrd:S._revOrd?S._revOrd.map(pid=>(pid+MP.mySlot)%np):null,_revIdx:S._revIdx,
      _revPid:realRevPid,_revSel:[...S._revSel],
      _fitTarget:S._fitTarget,_fitCandidates:S._fitCandidates?[...S._fitCandidates]:null,
      ts:Date.now()
    };
    await sbSet(MP.salaId,estado);
  }catch(e){console.log('Error publicando estado:',e);}
}

function showError(msg){
  rmEl('LOBBY_OV');rmEl('MODE_OV');rmEl('NOM_OV');
  const ov=document.createElement('div');ov.id='ERR_OV';
  ov.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.95);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:900;padding:24px;text-align:center';
  ov.innerHTML=`
    <div style="font-size:32px">⚠️</div>
    <div style="font-family:Cinzel,serif;font-size:14px;color:#E24B4A">${msg}</div>
    <button onclick="rmEl('ERR_OV');showModeScreen()" style="padding:10px 20px;border-radius:7px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-family:Cinzel,serif;font-size:11px;cursor:pointer;touch-action:manipulation">← Volver</button>`;
  $('G').appendChild(ov);
}

</script>
